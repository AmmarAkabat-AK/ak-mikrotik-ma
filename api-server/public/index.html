<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AK-MIKROTIK-MAP</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020617;--card:#0d1929;--card2:#0d1e38;--modal:#081325;
  --primary:#2ea8ff;--border:rgba(255,255,255,.07);
  --text:#e2e8f0;--muted:#64748b;--sidebar:#0a1628;
  --input:#0f1d34;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button,input,select,textarea{font-family:inherit}
a{color:var(--primary);text-decoration:none}
#root{display:flex;height:100vh;overflow:hidden}
#sidebar{width:270px;background:var(--sidebar);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;overflow-y:auto;transition:transform .3s}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:20px;flex-shrink:0;gap:12px}
#content{flex:1;overflow-y:auto;padding:0 20px 80px}
.sidebar-logo{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sidebar-logo h2{font-size:22px;font-weight:900;background:linear-gradient(90deg,var(--primary),#60c3ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-logo .wifi-icon{color:var(--primary);font-size:24px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:600;color:#94a3b8;border:none;background:transparent;width:100%;text-align:right}
.nav-item:hover{background:#1e293b;color:#cbd5e1}
.nav-item.active{background:rgba(46,168,255,.15);color:#fff;box-shadow:inset -3px 0 0 var(--primary)}
.nav-item .nav-icon{font-size:18px;opacity:.8}
.nav-item.active .nav-icon{opacity:1}
.nav-logout{margin-top:auto;color:#64748b;cursor:pointer;padding:12px 16px;border-radius:16px;display:flex;align-items:center;gap:12px;border:none;background:transparent;width:100%;font-size:14px;font-weight:600;transition:all .2s}
.nav-logout:hover{background:rgba(239,68,68,.1);color:#ef4444}
#page-title{font-size:1.6rem;font-weight:900;flex:1;text-align:right}
.live-badge{display:flex;align-items:center;gap:6px;background:#0f1d34;padding:8px 16px;border-radius:12px;font-size:12px;font-weight:700}
.live-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.menu-btn{display:none;width:44px;height:44px;background:var(--primary);color:#fff;border-radius:12px;border:none;cursor:pointer;font-size:22px;align-items:center;justify-content:center}
#login-page{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{width:100%;max-width:430px;background:rgba(13,25,41,.95);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:36px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.login-icon{width:80px;height:80px;margin:0 auto 20px;border-radius:22px;background:linear-gradient(135deg,var(--primary),#1b6fba);display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 0 32px rgba(46,168,255,.4)}
.login-card h1{font-size:2rem;font-weight:900;color:#fff;margin-bottom:6px}
.login-card p{color:#64748b;font-size:.85rem;margin-bottom:24px}
.field{position:relative;margin-bottom:12px}
.field-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;font-size:16px;pointer-events:none}
input,select{width:100%;padding:14px 44px 14px 14px;background:var(--input);border:1px solid rgba(255,255,255,.1);border-radius:16px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;appearance:none}
input:focus,select:focus{border-color:var(--primary)}
input[dir="ltr"],select[dir="ltr"]{padding-right:14px;padding-left:14px;text-align:left}
input::placeholder{color:#475569}
label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:4px;font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--primary),#1b6fba);color:#fff}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(46,168,255,.3)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.1);color:#94a3b8}
.btn-outline:hover{color:#fff;background:rgba(255,255,255,.05)}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:none}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-warn{background:rgba(249,115,22,.15);color:#f97316;border:none}
.btn-warn:hover{background:rgba(249,115,22,.25)}
.btn-info{background:rgba(46,168,255,.15);color:var(--primary);border:none}
.btn-info:hover{background:rgba(46,168,255,.25)}
.btn-green{background:rgba(34,197,94,.15);color:#22c55e;border:none}
.btn-green:hover{background:rgba(34,197,94,.25)}
.btn-cyan{background:linear-gradient(135deg,#06b6d4,#0e7490);color:#fff}
.btn-cyan:hover:not(:disabled){transform:translateY(-1px)}
.btn-full{width:100%;padding:16px;font-size:1rem;border-radius:18px}
.btn-sm{padding:0;font-size:.78rem;border-radius:8px;width:32px;height:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px}
.card-header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.card-header h2{font-size:1.1rem;font-weight:700;color:#fff}
.card-header .icon{font-size:22px}
.stat-grid{display:grid;gap:16px;margin-bottom:20px}
.stat-grid-4{grid-template-columns:repeat(4,1fr)}
.stat-grid-3{grid-template-columns:repeat(3,1fr)}
.stat-grid-2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;align-items:center;justify-content:space-between;transition:transform .3s;overflow:hidden;position:relative}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(46,168,255,.05),transparent);pointer-events:none}
.stat-card:hover{transform:translateY(-2px)}
.stat-value{font-size:2rem;font-weight:900;color:#fff;margin-top:4px}
.stat-label{font-size:.8rem;color:#64748b;font-weight:500}
.stat-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:24px;overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem;text-align:center}
thead{background:var(--card2);color:#64748b;font-weight:700;font-size:.75rem;text-transform:uppercase}
th{padding:12px 16px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(46,168,255,.03)}
.td-actions{display:flex;justify-content:center;gap:6px}
.status-online{color:#22c55e;font-weight:700}
.status-offline{color:#ef4444;font-weight:700}
.status-maintenance{color:#f97316;font-weight:700}
.status-active{color:#22c55e;font-weight:700}
.status-vacation{color:#f97316;font-weight:700}
.status-suspended{color:#ef4444;font-weight:700}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700}
.pill-blue{background:rgba(46,168,255,.15);color:var(--primary)}
.pill-green{background:rgba(34,197,94,.15);color:#22c55e}
.pill-orange{background:rgba(249,115,22,.15);color:#f97316}
.pill-purple{background:rgba(167,139,250,.15);color:#a78bfa}
.pill-yellow{background:rgba(234,179,8,.15);color:#eab308}
.pill-red{background:rgba(239,68,68,.15);color:#ef4444}
.pill-cyan{background:rgba(6,182,212,.15);color:#06b6d4}
.conn-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:currentColor;margin-left:6px}
.conn-dot.pulse{animation:pulse 1.5s infinite}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--modal);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .2s}
.modal-box.wide{max-width:760px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:1.1rem;font-weight:900;color:#fff;margin-bottom:20px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-full{grid-column:1/-1}
.form-group{margin-bottom:14px}
.modal-close{float:left;background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;line-height:1;padding:0}
.modal-close:hover{color:#fff}
#toast-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;min-width:280px}
.toast{padding:12px 20px;border-radius:14px;font-size:.87rem;font-weight:600;animation:toastIn .3s,toastOut .3s 2.7s forwards;box-shadow:0 8px 24px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(20px)}}
.toast-success{background:#166534;color:#bbf7d0;border:1px solid #22c55e40}
.toast-error{background:#7f1d1d;color:#fecaca;border:1px solid #ef444440}
.toast-info{background:#1e3a5f;color:#bfdbfe;border:1px solid #2ea8ff40}
.toast-warn{background:#713f12;color:#fef08a;border:1px solid #eab30840}
.progress{height:6px;background:rgba(255,255,255,.08);border-radius:9px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:9px;transition:width .4s}
.fill-green{background:#22c55e}.fill-yellow{background:#eab308}.fill-red{background:#ef4444}.fill-blue{background:var(--primary)}
.info-box{background:rgba(46,168,255,.07);border:1px solid rgba(46,168,255,.2);border-radius:10px;padding:10px 14px;font-size:.83rem;color:#94a3b8;margin-bottom:12px}
.error-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 14px;font-size:.83rem;color:#fca5a5;margin-bottom:12px}
.warn-box{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:10px;padding:10px 14px;font-size:.83rem;color:#fef08a;margin-bottom:12px}
.success-box{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 14px;font-size:.83rem;color:#86efac}
#map{height:60vh;min-height:400px;border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.map-legend{display:flex;flex-wrap:wrap;gap:16px;font-size:.85rem;font-weight:700;background:var(--card2);padding:12px 16px;border-radius:16px;border:1px solid var(--border);margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.event-item{background:#0f1d34;border-radius:14px;padding:14px;font-size:.85rem;color:#cbd5e1;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.router-panel{border-radius:16px;padding:16px;border:1px solid;margin-bottom:12px}
.router-panel.online-panel{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.2)}
.router-panel.offline-panel{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.2)}
.panel-row{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:6px}
.hint-text{color:#eab308;font-size:.8rem;font-weight:700;margin-bottom:4px}
.error-mono{color:#475569;font-size:.72rem;font-family:monospace;word-break:break-all}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.font-bold{font-weight:700}.font-black{font-weight:900}
.text-white{color:#fff}.text-muted{color:#64748b}.text-sm{font-size:.85rem}.text-xs{font-size:.75rem}
.text-primary{color:var(--primary)}.text-green{color:#22c55e}.text-red{color:#ef4444}
.space-y>*+*{margin-top:12px}
.hidden{display:none!important}
.spin{animation:spinning .8s linear infinite}
@keyframes spinning{to{transform:rotate(360deg)}}
.d-ltr{direction:ltr;text-align:left}
.w-full{width:100%}
.text-center{text-align:center}
.tg-log{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:10px;border-right:4px solid}
.tg-log.err{border-color:#ef4444}.tg-log.ok{border-color:#22c55e}.tg-log.info{border-color:var(--primary)}
.search-wrap{position:relative;flex:1}
.search-wrap input{padding-right:40px}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;font-size:16px;pointer-events:none}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:8px 14px;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:var(--card2);color:#94a3b8;transition:all .2s;font-family:inherit}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299}
/* ياقات (tags) الباقات */
.tag-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:700;border:1px solid}
.um-user-card{background:var(--card2);border-radius:16px;padding:14px 16px;border:1px solid var(--border);transition:all .2s}
.um-user-card:hover{border-color:rgba(46,168,255,.3);transform:translateY(-1px)}
@media(max-width:768px){
  .stat-grid-4{grid-template-columns:repeat(2,1fr)}
  .stat-grid-3{grid-template-columns:repeat(2,1fr)}
  .modal-grid{grid-template-columns:1fr}
  .grid-full{grid-column:auto}
  #sidebar{position:fixed;inset-y:0;right:0;z-index:300;transform:translateX(100%)}
  #sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .sidebar-overlay{display:block!important}
}
@media print{
  #sidebar,#topbar,.no-print{display:none!important}
  #content{padding:0}
  body{background:#fff;color:#000}
  .card,.table-wrap{border:1px solid #ccc}
  table{font-size:12px}
  thead{background:#eee!important;color:#000}
}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-card">
    <div class="login-icon">📡</div>
    <h1>AK-MIKROTIK</h1>
    <p>نظام إدارة شركات الإنترنت الذكي</p>
    <form id="login-form">
      <div class="field">
        <span class="field-icon">👤</span>
        <input id="login-user" type="text" placeholder="اسم المستخدم" required/>
      </div>
      <div class="field">
        <span class="field-icon">🔒</span>
        <input id="login-pass" type="password" placeholder="كلمة المرور" required/>
      </div>
      <div class="field">
        <select id="login-role">
          <option>مدير النظام</option>
          <option>موظف</option>
          <option>محاسب</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">دخول النظام</button>
    </form>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="root" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo">
      <h2>AK-MIKROTIK</h2>
      <span class="wifi-icon">📶</span>
    </div>
    <nav id="nav-menu"></nav>
    <button class="nav-logout" onclick="doLogout()">🚪 تسجيل الخروج</button>
  </aside>
  <div id="main">
    <header id="topbar">
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <h1 id="page-title">لوحة التحكم</h1>
      <div class="live-badge">
        <span class="live-dot"></span> LIVE
        <span id="user-name" style="color:#64748b;font-weight:400;margin-right:10px;padding-right:10px;border-right:1px solid rgba(255,255,255,.1)"></span>
      </div>
    </header>
    <div id="content"></div>
  </div>
</div>

<div id="toast-area"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  "https://zvzjxrfjrbgybyqcaxbe.supabase.co",
  "sb_publishable_G_4krnvJ3eeP_Uv--M75CA_iWmafDf3"
);

let state = {
  user: null,
  activePage: "dashboard",
  devices: [],
  routers: [],
  users: [],
  watchers: [],
};

const NAV = [
  {id:"dashboard",    label:"الصفحة الرئيسية",         icon:"🏠"},
  {id:"devices",      label:"إدارة أجهزة الشبكة",       icon:"🖥️"},
  {id:"map",          label:"خريطة الأجهزة",             icon:"🗺️"},
  {id:"mikrotik",     label:"إدارة راوترات MikroTik",    icon:"📡"},
  {id:"um-users",     label:"مستخدمو User Manager",      icon:"🎫"},
  {id:"watchers",     label:"الموظفون والمراقبة",        icon:"👥"},
  {id:"telegram",     label:"تنبيهات Telegram",          icon:"✈️"},
  {id:"card-sales",   label:"تقارير مبيعات الكروت",      icon:"📊"},
  {id:"settings",     label:"إعدادات النظام",             icon:"⚙️"},
];

function buildNav() {
  const nav = document.getElementById("nav-menu");
  nav.innerHTML = NAV.map(n => `
    <button class="nav-item${state.activePage===n.id?' active':''}" onclick="navigate('${n.id}')">
      <span class="nav-icon">${n.icon}</span>${n.label}
    </button>`).join("");
}

function navigate(page) {
  state.activePage = page;
  buildNav();
  const title = NAV.find(n=>n.id===page)?.label||"";
  document.getElementById("page-title").textContent = title;
  closeSidebar();
  renderPage();
}

async function loadAll() {
  await Promise.all([loadDevices(),loadRouters(),loadUsers(),loadWatchers()]);
}
async function loadDevices()  { const {data}=await sb.from("devices").select("*"); state.devices=data||[]; }
async function loadRouters()  { const {data}=await sb.from("mikrotik_servers").select("*"); state.routers=data||[]; }
async function loadUsers()    { const {data}=await sb.from("users").select("*"); state.users=data||[]; }
async function loadWatchers() { const {data}=await sb.from("watchers").select("*"); state.watchers=data||[]; }

function toast(msg, type="info") {
  const area = document.getElementById("toast-area");
  const t = document.createElement("div");
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  area.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

document.getElementById("login-form").addEventListener("submit", async e => {
  e.preventDefault();
  const u = document.getElementById("login-user").value.trim();
  const p = document.getElementById("login-pass").value.trim();
  if (!u||!p) { toast("الرجاء إدخال البيانات","error"); return; }
  const btn = document.getElementById("login-btn");
  btn.textContent = "جاري الدخول..."; btn.disabled=true;
  const {data,error} = await sb.from("users").select("*").eq("name",u).eq("password",p).single();
  if (error||!data) {
    toast("بيانات الدخول غير صحيحة","error");
    btn.textContent="دخول النظام"; btn.disabled=false;
  } else {
    state.user = data;
    localStorage.setItem("ak_session", JSON.stringify(data));
    showApp();
  }
});

function showApp() {
  document.getElementById("login-page").style.display = "none";
  document.getElementById("root").classList.remove("hidden");
  document.getElementById("user-name").textContent = state.user?.full_name||state.user?.name||"";
  loadAll().then(()=>navigate("dashboard"));
}

function doLogout() {
  state.user=null;
  localStorage.removeItem("ak_session");
  location.reload();
}

function openModal(html, id="modal-main") {
  closeModal();

  ov.className="modal-overlay"; ov.id=id;
  ov.innerHTML=html;
  ov.addEventListener("click", e=>{ if(e.target===ov) closeModal(id); });
  document.body.appendChild(ov);
}
function closeModal(id="modal-main") {
  const el=document.getElementById(id)||document.querySelector(".modal-overlay");
  if(el) el.remove();
}

function renderPage() {
  const c = document.getElementById("content");
  switch(state.activePage) {
    case "dashboard":  c.innerHTML = renderDashboard(); break;
    case "devices":    c.innerHTML = renderDevices(); break;
    case "map":        c.innerHTML = renderMap(); initMap(); break;
    case "mikrotik":   c.innerHTML = renderMikrotik(); break;
    case "um-users":   c.innerHTML = renderUMUsers(); break;
    case "watchers":   c.innerHTML = renderWatchers(); break;
    case "telegram":   c.innerHTML = renderTelegram(); break;
    case "card-sales": c.innerHTML = renderCardSales(); initCardSales(); break;

let discoverResults = [], addedKeys = new Set();

function openDiscoverModal() {
  discoverResults = []; addedKeys = new Set();

      </select>

      <input id="disc-subnet" dir="ltr" placeholder="172.16.0.0/16"/>
    </div>
    <div id="disc-error"></div>
    <button class="btn btn-primary btn-full" onclick="runDiscover()" id="disc-btn">🔍 بدء الكشف</button>
    <div id="disc-results" class="mt-16"></div>
  </div>`);
}

async function runDiscover() {
  const rid = document.getElementById("disc-router").value;
  const router = state.routers.find(r=>String(r.id)===String(rid));
  if(!router) { document.getElementById("disc-error").innerHTML=`<div class="error-box">الرجاء اختيار الراوتر أولاً</div>`; return; }
  const btn = document.getElementById("disc-btn");
  btn.disabled=true; btn.textContent="⏳ جاري الكشف...";
  document.getElementById("disc-error").innerHTML="";
  document.getElementById("disc-results").innerHTML="";
  try {
    const res = await fetch("/api/mikrotik/discover",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({host:router.host,username:router.username,password:router.password,port:router.port||8728,
        subnet:document.getElementById("disc-subnet").value||undefined,
        deviceFilter:document.getElementById("disc-filter").value})
    });
    const data = await res.json();
    if(!res.ok) { document.getElementById("disc-error").innerHTML=`<div class="error-box">❌ ${data.error||"فشل الاتصال"}</div>`; return; }
    discoverResults = data.devices||[];
    if(!discoverResults.length) { document.getElementById("disc-error").innerHTML=`<div class="warn-box">لم يتم العثور على أجهزة</div>`; return; }
    renderDiscoverResults(router.name);
  } catch { document.getElementById("disc-error").innerHTML=`<div class="error-box">تعذر الوصول للسيرفر</div>`; }
  finally { btn.disabled=false; btn.textContent="🔍 بدء الكشف"; }
}

function renderDiscoverResults(routerName) {
  const rows = discoverResults.map((d,i)=>{
    const key=d.mac||d.ip; const added=addedKeys.has(key);
    return `<tr style="${added?'opacity:.5':''}">
      <td class="d-ltr text-primary">${d.ip}</td>
      <td>${d.hostname||"-"}</td><td>${d.type}</td>
      <td class="d-ltr text-muted" style="font-size:.72rem">${d.mac||"-"}</td>
      <td><button class="btn btn-green btn-sm" style="width:auto;padding:4px 10px" onclick="addDiscDevice(${i},'${routerName}')" ${added?"disabled":""}>
        ${added?"✓":"+ إضافة"}
      </button></td>
    </tr>`;
  }).join("");
  document.getElementById("disc-results").innerHTML=`
    <div class="flex items-center justify-between mb-8">
      <span class="text-muted text-sm">تم اكتشاف ${discoverResults.length} جهاز</span>
      <button class="btn btn-green" style="padding:8px 14px;font-size:.8rem" onclick="addAllDisc('${routerName}')">+ إضافة الكل</button>
    </div>
    <div class="table-wrap"><div class="table-scroll">
    <table><thead><tr><th>IP</th><th>الاسم</th><th>النوع</th><th>MAC</th><th>إضافة</th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

async function addDiscDevice(i, routerName) {
  const d = discoverResults[i]; const key=d.mac||d.ip;
  const {error} = await sb.from("devices").insert([{
    name:d.hostname||d.ip,type:d.type==="راوتر MikroTik"?"برج رئيسي":d.type||"مودم",
    router:routerName,ip:d.ip,status:"online",
    notes:`MAC: ${d.mac} | Interface: ${d.interface} | Source: ${d.source}`
  }]);
  if(error) toast("خطأ","error");
  else { toast(`تمت إضافة ${d.hostname||d.ip}`,"success"); addedKeys.add(key); await loadDevices(); renderDiscoverResults(routerName); }
}

async function addAllDisc(routerName) {
  const toAdd = discoverResults.filter(d=>!addedKeys.has(d.mac||d.ip));
  if(!toAdd.length) return;
  const rows = toAdd.map(d=>({
    name:d.hostname||d.ip,type:d.type==="راوتر MikroTik"?"برج رئيسي":d.type||"مودم",
    router:routerName,ip:d.ip,status:"online",notes:`MAC: ${d.mac} | Interface: ${d.interface}`
  }));
  const {error} = await sb.from("devices").insert(rows);
  if(error) toast("خطأ","error");
  else { toast(`تمت إضافة ${rows.length} جهاز`,"success"); toAdd.forEach(d=>addedKeys.add(d.mac||d.ip)); await loadDevices(); renderDiscoverResults(routerName); }
}

let _map=null, _tileLayer=null, _mapType="s", _mapFilter="الكل";

function parseLoc(s) {
  if(!s) return null;
  const p=s.split(","); if(p.length!==2) return null;
  const lat=parseFloat(p[0]),lng=parseFloat(p[1]);
  return isNaN(lat)||isNaN(lng)?null:[lat,lng];
}
function coloredIcon(color) {
  return L.divIcon({className:"",iconAnchor:[0,24],popupAnchor:[0,-36],
    html:`<span style="background:${color};width:24px;height:24px;display:block;position:relative;left:-12px;top:-12px;border-radius:50% 50% 0 50%;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></span>`});
}
function initMap() {
  if(_map) { _map.remove(); _map=null; }
  _map = L.map("map",{zoomControl:false}).setView([15.3694,44.191],12);
  L.control.zoom({position:"bottomleft"}).addTo(_map);
  _tileLayer = L.tileLayer(`https://{s}.google.com/vt/lyrs=${_mapType}&x={x}&y={y}&z={z}`,{
    subdomains:["mt0","mt1","mt2","mt3"],attribution:"© Google Maps",maxZoom:20
  }).addTo(_map);
  updateMapMarkers();
}
function updateMapMarkers() {
  if(!_map) return;
  _map.eachLayer(l=>{ if(l instanceof L.Marker||l instanceof L.Polyline) _map.removeLayer(l); });
  const search = document.getElementById("map-search")?.value.toLowerCase()||"";
  const filtered = state.devices.filter(d=>{
    const ms = d.name?.toLowerCase().includes(search)||d.ip?.includes(search);
    if(!ms) return false;
    if(_mapFilter==="الكل") return true;
    if(_mapFilter==="منقطع") return d.status==="offline";
    return d.type===_mapFilter;
  });
  filtered.forEach(d=>{
    const ll=parseLoc(d.location); if(!ll) return;
    const color=d.status==="online"?"#22c55e":d.status==="offline"?"#ef4444":"#facc15";
    L.marker(ll,{icon:coloredIcon(color)}).addTo(_map)
      .bindPopup(`<div style="font-family:Cairo,sans-serif;min-width:160px;direction:rtl">
        <strong>${d.name}</strong><br/>${d.type}<br/><span style="color:${color}">${d.status}</span>
        ${d.ip?`<br/><span style="direction:ltr;display:block">${d.ip}</span>`:""}
      </div>`);
  });
  state.routers.forEach(r=>{
    const ll=parseLoc(r.location); if(!ll) return;
    L.marker(ll,{icon:coloredIcon("#2ea8ff")}).addTo(_map)
      .bindPopup(`<div style="font-family:Cairo,sans-serif;direction:rtl"><strong>📡 ${r.name}</strong><br/><span style="direction:ltr;display:block">${r.host}</span></div>`);
  });
}
function filterMap() { updateMapMarkers(); }
function setMapFilter(f,btn) {
  _mapFilter=f;
  document.querySelectorAll("#map-filters .filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  updateMapMarkers();
}
function setMapType(t,btn) {
  _mapType=t;
  document.querySelectorAll(".filter-btns .filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(_tileLayer) { _map.removeLayer(_tileLayer); }
  _tileLayer = L.tileLayer(`https://{s}.google.com/vt/lyrs=${t}&x={x}&y={y}&z={z}`,{
    subdomains:["mt0","mt1","mt2","mt3"],attribution:"© Google Maps",maxZoom:20
  }).addTo(_map);
}

    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr><th>اسم الفرع</th><th>IP / Host</th><th>المنفذ</th><th>الحالة</th><th>إجراء</th></tr></thead>
      <tbody id="routers-tbody">${rows}</tbody></table>
    </div></div>
    <div class="card">
      <div class="card-header"><span>🛡️</span><h2>بيانات مسحوبة</h2></div>
      <div id="router-info-panel">
        ${checkedRouters.length===0?`<div class="text-muted text-center text-sm" style="padding:40px 0">اضغط زر الفحص لسحب البيانات</div>`:checkedRouters.map(r=>routerInfoCard(r.id)).join("")}
      </div>
    </div>
  </div>`;
}

function routerDbStatus(s) {
  if(s==="online") return `<span class="status-online"><span class="conn-dot pulse" style="color:#22c55e"></span>متصل</span>`;
  return `<span class="status-offline"><span class="conn-dot" style="color:#ef4444"></span>غير متصل</span>`;
}
function routerStatusCell(rid) {
  const info = pingCache[rid];
  if(!info) return routerDbStatus(state.routers.find(r=>r.id===rid)?.status);
  if(info.online) return `<span class="status-online"><span class="conn-dot pulse" style="color:#22c55e"></span>متصل</span><div class="text-xs text-muted mt-4">${info.uptime||""}</div>`;
  if(info.reason==="PRIVATE_IP") return `<span class="status-offline">IP داخلي</span>`;
  return `<span class="status-offline"><span class="conn-dot" style="color:#ef4444"></span>غير متصل</span>`;
}
function routerInfoCard(rid) {
  const info = pingCache[rid];
  const r = state.routers.find(x=>x.id===rid);
  if(!info||!r) return "";
  const mem = (info.freeMemory&&info.totalMemory) ? Math.round(((info.totalMemory-info.freeMemory)/info.totalMemory)*100) : null;
  return `<div class="router-panel ${info.online?"online-panel":"offline-panel"} mb-12">
    <div class="flex items-center justify-between mb-8">
      <span style="color:${info.online?"#22c55e":"#ef4444"};font-weight:700;font-size:.85rem">${info.online?"📶 متصل":"📴 غير متصل"}</span>
      <span class="font-bold text-white text-sm">${r.name}</span>
    </div>
    ${info.online?`
      ${info.board?`<div class="panel-row"><span class="text-white">${info.board}</span><span class="text-muted">الجهاز</span></div>`:""}
      ${info.version?`<div class="panel-row"><span class="text-white d-ltr" style="font-size:.78rem">${info.version}</span><span class="text-muted">الإصدار</span></div>`:""}
      ${info.uptime?`<div class="panel-row"><span class="text-primary">⏱ ${info.uptime}</span><span class="text-muted">وقت التشغيل</span></div>`:""}
      ${info.cpuLoad!=null?`<div class="panel-row"><span>CPU ${info.cpuLoad}%</span><span class="text-muted">المعالج</span></div>
       <div class="progress"><div class="progress-fill ${info.cpuLoad>80?"fill-red":info.cpuLoad>50?"fill-yellow":"fill-green"}" style="width:${info.cpuLoad}%"></div></div>`:""}
      ${mem!=null?`<div class="panel-row mt-8"><span>RAM ${mem}%</span><span class="text-muted">الذاكرة</span></div>
       <div class="progress"><div class="progress-fill ${mem>80?"fill-red":mem>60?"fill-yellow":"fill-blue"}" style="width:${mem}%"></div></div>`:""}
    `:`
      ${info.hint?`<div class="hint-text">⚠ ${info.hint}</div>`:""}
      ${info.error?`<div class="error-mono">${info.error}</div>`:""}
      <div class="text-xs text-muted mt-8">تحقق من: IP › Services › api مفعّل</div>
    `}
  </div>`;
}

async function pingRouter(id) {
  const r = state.routers.find(x=>x.id===id); if(!r) return;
  const btn=document.getElementById(`ping-btn-${id}`);
  if(btn){btn.disabled=true;btn.textContent="⏳";}
  const statEl=document.getElementById(`rstat-${id}`);
  if(statEl) statEl.innerHTML=`<span class="text-muted">⏳ فحص...</span>`;
  try {
    const res = await fetch("/api/mikrotik/ping",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({host:r.host,username:r.username,password:r.password,port:r.port||8728})
    });
    const data = await res.json();
    pingCache[id]=data;
    await sb.from("mikrotik_servers").update({status:data.online?"online":"disconnected"}).eq("id",id);
    await loadRouters();
    if(statEl) statEl.innerHTML=routerStatusCell(id);
    const panel=document.getElementById("router-info-panel");
    if(panel) panel.innerHTML=state.routers.filter(x=>pingCache[x.id]).map(x=>routerInfoCard(x.id)).join("")||`<div class="text-muted text-center text-sm" style="padding:40px 0">اضغط زر الفحص</div>`;
    toast(data.online?`${r.name} متصل ✓`:`${r.name} غير متصل`, data.online?"success":"error");
  } catch { toast("تعذر الاتصال بالسيرفر","error"); }
  finally { if(btn){btn.disabled=false;btn.textContent="⚡";} }
}

async function pingAll() {
  const btn=document.getElementById("ping-all-btn");
  if(btn){btn.disabled=true;btn.textContent="⏳ جاري الفحص...";}
  toast("جاري فحص جميع الراوترات...","info");
  await Promise.all(state.routers.map(r=>pingRouter(r.id)));
  if(btn){btn.disabled=false;btn.textContent="↻ فحص الكل";}
  toast("اكتمل فحص جميع الراوترات","success");
}

async function deleteRouter(id) {
  if(!confirm("هل أنت متأكد من حذف هذا الراوتر؟")) return;
  const {error}=await sb.from("mikrotik_servers").delete().eq("id",id);
  if(error) toast("خطأ أثناء الحذف","error");
  else { delete pingCache[id]; toast("تم الحذف","success"); await loadRouters(); renderPage(); }
}

async function saveRouter(e, id) {
  e.preventDefault();
  const payload = {
    name:document.getElementById("r-name").value,
    host:document.getElementById("r-host").value,
    username:document.getElementById("r-user").value,
    password:document.getElementById("r-pass").value,
    port:parseInt(document.getElementById("r-port").value)||8728,
    location:document.getElementById("r-loc").value,
  };
  const {error} = id
    ? await sb.from("mikrotik_servers").update(payload).eq("id",id)
    : await sb.from("mikrotik_servers").insert([{...payload,status:"disconnected"}]);
  if(error) toast("خطأ أثناء الحفظ","error");
  else { toast("تم الحفظ","success"); closeModal(); await loadRouters(); renderPage(); }
}

/* ألوان الباقات / الياقات */
const TAG_COLORS = [
  {bg:"rgba(46,168,255,.15)",  color:"#2ea8ff",  border:"rgba(46,168,255,.3)"},
  {bg:"rgba(34,197,94,.15)",   color:"#22c55e",  border:"rgba(34,197,94,.3)"},
  {bg:"rgba(167,139,250,.15)", color:"#a78bfa",  border:"rgba(167,139,250,.3)"},
  {bg:"rgba(249,115,22,.15)",  color:"#f97316",  border:"rgba(249,115,22,.3)"},
  {bg:"rgba(234,179,8,.15)",   color:"#eab308",  border:"rgba(234,179,8,.3)"},
  {bg:"rgba(6,182,212,.15)",   color:"#06b6d4",  border:"rgba(6,182,212,.3)"},
  {bg:"rgba(239,68,68,.15)",   color:"#ef4444",  border:"rgba(239,68,68,.3)"},
  {bg:"rgba(236,72,153,.15)",  color:"#ec4899",  border:"rgba(236,72,153,.3)"},
];
const tagColorCache = {};
let tagColorIndex = 0;

function getTagColor(profile) {
  if(!tagColorCache[profile]) {
    tagColorCache[profile] = TAG_COLORS[tagColorIndex % TAG_COLORS.length];
    tagColorIndex++;
  }
  return tagColorCache[profile];
}

function profileTag(profile) {
  if(!profile) return '<span class="text-muted">-</span>';
  const c = getTagColor(profile);
  return `<span class="tag-badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">🎫 ${profile}</span>`;
}

function onUMRouterChange() {
  const rid = document.getElementById("um-router").value;
  umState.routerId = rid;
  umState.users = [];
  umState.profiles = [];
  umState.total = 0;
  umState.activeCount = 0;
  umState.disabledCount = 0;
  umState.search = "";
  umState.profileFilter = "الكل";
  umState.statusFilter = "الكل";
  if(state.activePage==="um-users") {
    document.getElementById("um-router-status").innerHTML="";
    document.getElementById("um-filters").classList.add("hidden");
    document.getElementById("um-content").innerHTML=`<div class="card text-center" style="padding:60px"><div style="font-size:48px;margin-bottom:12px">🎫</div><div class="text-muted">اضغط تحميل لجلب المستخدمين</div></div>`;
  }
}

async function loadUMUsers() {
  const rid = document.getElementById("um-router")?.value || umState.routerId;
  const router = state.routers.find(r=>String(r.id)===String(rid));
  if(!router) { toast("اختر الراوتر أولاً","error"); return; }

  umState.routerId = String(rid);
  umState.loading = true;
  const btn = document.getElementById("um-load-btn");
  if(btn) { btn.disabled=true; btn.textContent="⏳ جاري التحميل..."; }
  document.getElementById("um-router-status").innerHTML=`<div class="info-box">⏳ جاري الاتصال بـ User Manager على ${router.name}...</div>`;

  try {
    const res = await fetch("/api/mikrotik/um-users",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        host:router.host,username:router.username,password:router.password,port:router.port||8728,
        search:umState.search,
        profileFilter:umState.profileFilter,
        statusFilter:umState.statusFilter,
        limit:500
      })
    });
    const data = await res.json();
    if(!res.ok) {
      document.getElementById("um-router-status").innerHTML=`<div class="error-box">❌ ${data.error||"فشل الاتصال"}</div>`;
      umState.loading=false;
      return;
    }
    umState.users = data.users||[];
    umState.profiles = data.profiles||[];
    umState.total = data.total||0;
    umState.activeCount = data.activeCount||0;
    umState.disabledCount = data.disabledCount||0;
    tagColorIndex=0;
    Object.keys(tagColorCache).forEach(k=>delete tagColorCache[k]);
    umState.loading=false;
    document.getElementById("um-router-status").innerHTML=`<div class="success-box">✓ تم تحميل ${umState.total} مستخدم من ${router.name}</div>`;
    document.getElementById("um-filters").classList.remove("hidden");
    document.getElementById("um-content").innerHTML=renderUMTable();
    rebuildUMProfileFilters();
    rebuildUMStats();
  } catch(err) {
    document.getElementById("um-router-status").innerHTML=`<div class="error-box">تعذر الوصول للسيرفر: ${err.message}</div>`;
    umState.loading=false;
  } finally {
    if(btn) { btn.disabled=false; btn.textContent="🔄 تحميل المستخدمين"; }
  }
}

function rebuildUMStats() {
  const grid = document.querySelector("#um-filters .stat-grid");
  if(!grid) return;
  grid.innerHTML=
    miniStat("إجمالي المستخدمين",umState.total)+
    miniStat("نشطون الآن",umState.activeCount)+
    miniStat("معطّلون",umState.disabledCount)+
    miniStat("الباقات",umState.profiles.length);
}

function rebuildUMProfileFilters() {
  const el = document.getElementById("um-profile-filters");
  if(!el) return;
  el.innerHTML=`<button class="filter-btn${umState.profileFilter==="الكل"?" active":""}" onclick="setUMProfileFilter('الكل',this)">الكل</button>`
    + umState.profiles.map(p=>`<button class="filter-btn${umState.profileFilter===p?" active":""}" onclick="setUMProfileFilter('${p}',this)">${profileTag(p)}</button>`).join("");
}

function filterUMUsers() {
  umState.search = document.getElementById("um-search").value;
  applyUMFiltersAndRedraw();
}

function setUMProfileFilter(p,btn) {
  umState.profileFilter=p;
  document.querySelectorAll("#um-profile-filters .filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  applyUMFiltersAndRedraw();
}

function setUMStatusFilter(s,btn) {
  umState.statusFilter=s;
  document.querySelectorAll("#um-status-filters .filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  applyUMFiltersAndRedraw();
}

function applyUMFiltersAndRedraw() {
  const rid = document.getElementById("um-router")?.value || umState.routerId;
  const router = state.routers.find(r=>String(r.id)===String(rid));
  if(!router || !umState.total) return;

  const q = umState.search.toLowerCase();
  const pf = umState.profileFilter;
  const sf = umState.statusFilter;

  const allUsers = umState._allUsers || umState.users;
  if(!umState._allUsers && umState.users.length) umState._allUsers = [...umState.users];

  let filtered = (umState._allUsers||[]).filter(u=>{
    if(q && !u.username.toLowerCase().includes(q) && !(u.profile||"").toLowerCase().includes(q) && !(u.comment||"").toLowerCase().includes(q)) return false;
    if(pf!=="الكل" && u.profile!==pf) return false;
    if(sf==="نشط" && !u.isActive) return false;
    if(sf==="معطل" && !u.disabled) return false;
    return true;
  });

  umState.users = filtered;
  document.getElementById("um-content").innerHTML=renderUMTable();
}

function showUMUserDetail(username) {
  const u = (umState._allUsers||umState.users).find(x=>x.username===username);
  if(!u) return;
  const c = getTagColor(u.profile);
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">تفاصيل المستخدم</div>

      <div style="font-size:48px;margin-bottom:8px">👤</div>

        ?'<span class="status-online"><span class="conn-dot pulse" style="color:#22c55e"></span>متصل الآن</span>'

    </div>
    <div style="display:grid;gap:8px">
      ${u["end-time"]?`<div class="panel-row" style="background:var(--card2);border-radius:10px;padding:10px 14px"><span class="text-muted">تاريخ الانتهاء</span><span class="text-white d-ltr">${u["end-time"]}</span></div>`:""}
      ${u["shared-users"]?`<div class="panel-row" style="background:var(--card2);border-radius:10px;padding:10px 14px"><span class="text-muted">المستخدمون المشتركون</span><span class="text-white">${u["shared-users"]}</span></div>`:""}
      ${u["caller-id"]?`<div class="panel-row" style="background:var(--card2);border-radius:10px;padding:10px 14px"><span class="text-muted">Caller ID</span><span class="text-white d-ltr">${u["caller-id"]}</span></div>`:""}
      ${u["limit-bytes-in"]?`<div class="panel-row" style="background:var(--card2);border-radius:10px;padding:10px 14px"><span class="text-muted">حد التنزيل</span><span class="text-white">${formatBytes(u["limit-bytes-in"])}</span></div>`:""}
      ${u["limit-bytes-out"]?`<div class="panel-row" style="background:var(--card2);border-radius:10px;padding:10px 14px"><span class="text-muted">حد الرفع</span><span class="text-white">${formatBytes(u["limit-bytes-out"])}</span></div>`:""}
      ${u.comment?`<div class="panel-row" style="background:var(--card2);border-radius:10px;padding:10px 14px"><span class="text-muted">ملاحظة</span><span class="text-white">${u.comment}</span></div>`:""}
    </div>
  </div>`);
}

function formatBytes(b) {
  if(!b||b==="0") return "غير محدود";
  const n=parseInt(b); if(isNaN(n)) return b;
  if(n>=1073741824) return (n/1073741824).toFixed(1)+" GB";
  if(n>=1048576) return (n/1048576).toFixed(1)+" MB";
  if(n>=1024) return (n/1024).toFixed(1)+" KB";
  return n+" B";
}

function openUMUsersForRouter(id) {
  umState.routerId = String(id);
  umState.users=[];umState.profiles=[];umState.total=0;umState.activeCount=0;umState.disabledCount=0;
  umState.search="";umState.profileFilter="الكل";umState.statusFilter="الكل";
  delete umState._allUsers;
  navigate("um-users");
  setTimeout(()=>{
    const sel=document.getElementById("um-router");
    if(sel) sel.value=String(id);
    loadUMUsers();
  },100);
}

function renderWatchers() {
  const active = state.watchers.filter(w=>w.status==="نشط").length;
  const devCount = new Set(state.watchers.map(w=>w.device).filter(Boolean)).size;
  const rows = state.watchers.map(w=>`<tr>
    <td class="font-bold text-white">${w.name}</td>
    <td class="d-ltr">${w.phone||"-"}</td>
    <td>${w.device||"-"}</td>
    <td class="d-ltr">${w.telegram||"-"}</td>
    <td>${watcherStatus(w.status)}</td>
    <td><div class="td-actions">
      <button class="btn btn-info btn-sm" onclick="openWatcherModal(${w.id})" title="تعديل">✎</button>
      <button class="btn btn-danger btn-sm" onclick="deleteWatcher(${w.id})" title="حذف">🗑</button>
    </div></td>
  </tr>`).join("")||`<tr><td colspan="6" class="text-muted text-center" style="padding:40px">لا يوجد موظفين</td></tr>`;
  return `
  <div class="flex items-center justify-between mb-16">
    <div><h2 class="font-black text-white" style="font-size:1.4rem">الموظفون والمراقبة</h2><p class="text-muted text-sm mt-4">إدارة موظفي المراقبة</p></div>
    <button class="btn btn-primary no-print" onclick="openWatcherModal()">👤+ إضافة موظف</button>
  </div>
  <div class="stat-grid stat-grid-3 mb-16">
    ${miniStat("عدد الموظفين",state.watchers.length)}${miniStat("موظفون نشطون",active)}${miniStat("أجهزة تحت المراقبة",devCount)}
  </div>
  <div class="table-wrap"><div class="table-scroll">
    <table><thead><tr><th>الاسم</th><th>الهاتف</th><th>الجهاز المراقب</th><th>Telegram ID</th><th>الحالة</th><th>إجراء</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div></div>`;
}

function watcherStatus(s) {
  if(s==="نشط")   return `<span class="status-active">نشط</span>`;
  if(s==="إجازة") return `<span class="status-vacation">إجازة</span>`;
  if(s==="موقوف") return `<span class="status-suspended">موقوف</span>`;
  return s||"-";
}

async function deleteWatcher(id) {
  if(!confirm("هل أنت متأكد من حذف هذا الموظف؟")) return;
  const {error}=await sb.from("watchers").delete().eq("id",id);
  if(error) toast("خطأ","error"); else { toast("تم الحذف","success"); await loadWatchers(); renderPage(); }
}

function openWatcherModal(id) {
  const w = id ? state.watchers.find(x=>x.id===id) : null;
  const d = w||{name:"",phone:"",device:"",telegram:"",status:"نشط"};
  const devOpts = state.devices.map(x=>`<option${d.device===x.name?" selected":""}>${x.name}</option>`).join("");
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">إضافة / تعديل موظف</div>
    <form onsubmit="saveWatcher(event,${id||0})">
      <div class="form-group"><label>اسم الموظف</label><input id="w-name" value="${d.name}" required/></div>
      <div class="modal-grid">
        <div class="form-group"><label>رقم الهاتف</label><input id="w-phone" value="${d.phone||""}" dir="ltr"/></div>
        <div class="form-group"><label>Telegram ID</label><input id="w-tg" value="${d.telegram||""}" dir="ltr"/></div>
      </div>
      <div class="form-group"><label>الجهاز المراقب</label>
        <select id="w-device"><option value="">لا يوجد جهاز</option>${devOpts}</select>
      </div>
      <div class="form-group"><label>الحالة</label>
        <select id="w-status">
          <option${d.status==="نشط"?" selected":""}>نشط</option>
          <option${d.status==="إجازة"?" selected":""}>إجازة</option>
          <option${d.status==="موقوف"?" selected":""}>موقوف</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-16">💾 حفظ الموظف</button>
    </form>
  </div>`);
}

async function saveWatcher(e,id) {
  e.preventDefault();
  const payload={
    name:document.getElementById("w-name").value,
    phone:document.getElementById("w-phone").value,
    telegram:document.getElementById("w-tg").value,
    device:document.getElementById("w-device").value,
    status:document.getElementById("w-status").value,
  };
  const {error}=id
    ? await sb.from("watchers").update(payload).eq("id",id)
    : await sb.from("watchers").insert([payload]);
  if(error) toast("خطأ","error"); else { toast("تم الحفظ","success"); closeModal(); await loadWatchers(); renderPage(); }
}

let salesPackages=[], salesData=[], salesRouterId="";

function renderCardSales() {
  const today=new Date(); const ma=new Date(today); ma.setMonth(ma.getMonth()-1);
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const routerOpts=state.routers.map(r=>`<option value="${r.id}">${r.name} (${r.host})</option>`).join("");
  return `
  <div class="card mb-16">
    <div class="flex items-center gap-12 mb-4"><span style="font-size:28px">📊</span>
      <div><h2 class="font-black text-white" style="font-size:1.4rem">تقارير مبيعات الكروت</h2>
      <p class="text-muted text-sm">طباعة وإحصائيات مبيعات User Manager</p></div>
    </div>
  </div>
  <button class="btn btn-full no-print" style="background:#22c55e;color:#fff;margin-bottom:16px;border-radius:18px" onclick="window.print()">🖨️ طباعة التقرير</button>
  <div class="card mb-16">
    <div class="form-group"><label>الراوتر</label>
      <select id="cs-router" dir="rtl" onchange="onSalesRouterChange()">
        <option value="">اختر الراوتر</option>${routerOpts}
      </select>
      <div id="cs-pkg-status"></div>
    </div>
    <div class="form-group"><label>الباقة</label>
      <select id="cs-package" dir="rtl" disabled><option value="جميع الباقات">جميع الباقات</option></select>
    </div>
    <div class="modal-grid">
      <div class="form-group"><label>من تاريخ</label><input type="date" id="cs-from" value="${fmt(ma)}" style="color-scheme:dark"/></div>
      <div class="form-group"><label>إلى تاريخ</label><input type="date" id="cs-to" value="${fmt(today)}" style="color-scheme:dark"/></div>
    </div>
    <div id="cs-report-error"></div>
    <button class="btn btn-primary btn-full" onclick="showSalesReport()" id="cs-btn">📈 عرض التقرير</button>
  </div>
  <div id="sales-result"></div>`;
}

function initCardSales() { salesPackages=[]; salesData=[]; salesRouterId=""; }

async function onSalesRouterChange() {
  const rid = document.getElementById("cs-router").value;
  salesRouterId = rid;
  const pkgSel = document.getElementById("cs-package");
  const status = document.getElementById("cs-pkg-status");
  if(!rid) { pkgSel.disabled=true; pkgSel.innerHTML=`<option value="جميع الباقات">جميع الباقات</option>`; status.innerHTML=""; return; }
  const router = state.routers.find(r=>String(r.id)===String(rid));
  if(!router) return;
  status.innerHTML=`<div class="info-box mt-8">⏳ جاري تحميل الباقات...</div>`;
  pkgSel.disabled=true;
  try {
    const res=await fetch("/api/mikrotik/packages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({host:router.host,username:router.username,password:router.password,port:router.port||8728})});
    const data=await res.json();
    if(!res.ok) { status.innerHTML=`<div class="error-box mt-8">❌ ${data.error||"فشل الاتصال"}</div>`; return; }
    salesPackages=data.packages||[];
    pkgSel.innerHTML=`<option value="جميع الباقات">جميع الباقات</option>`+salesPackages.map(p=>`<option>${p}</option>`).join("");
    pkgSel.disabled=false;
    status.innerHTML=`<div class="success-box mt-8">✓ تم تحميل ${salesPackages.length} باقة</div>`;
  } catch { status.innerHTML=`<div class="error-box mt-8">تعذر الوصول للسيرفر</div>`; }
}

async function showSalesReport() {
  const rid=document.getElementById("cs-router").value;
  const router=state.routers.find(r=>String(r.id)===String(rid));
  if(!router) { toast("اختر الراوتر أولاً","error"); return; }
  const btn=document.getElementById("cs-btn"); btn.disabled=true; btn.textContent="⏳ جاري الجلب...";
  document.getElementById("cs-report-error").innerHTML="";
  document.getElementById("sales-result").innerHTML="";
  try {
    const res=await fetch("/api/mikrotik/sales-report",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        host:router.host,username:router.username,password:router.password,port:router.port||8728,
        packageName:document.getElementById("cs-package").value,
        fromDate:document.getElementById("cs-from").value,
        toDate:document.getElementById("cs-to").value,
      })
    });
    const data=await res.json();
    if(!res.ok) { document.getElementById("cs-report-error").innerHTML=`<div class="error-box mb-12">❌ ${data.error||"فشل الجلب"}</div>`; return; }
    salesData=data.rows||[];
    renderSalesTable(router.name);
  } catch { document.getElementById("cs-report-error").innerHTML=`<div class="error-box mb-12">تعذر الوصول للسيرفر</div>`; }
  finally { btn.disabled=false; btn.textContent="📈 عرض التقرير"; }
}

function renderSalesTable(routerName) {
  if(!salesData.length) { document.getElementById("sales-result").innerHTML=`<div class="card text-center text-muted" style="padding:40px">لا توجد بيانات للفترة المحددة</div>`; return; }
  const total=salesData.reduce((s,r)=>s+r.count,0);
  const rows=salesData.map((r,i)=>`<tr>
    <td class="text-muted">${i+1}</td>
    <td>${profileTag(r.package)}</td>
    <td class="font-black text-white" style="font-size:1.1rem">${r.count.toLocaleString()}</td>
    <td>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;background:rgba(255,255,255,.05);border-radius:9px;height:6px;max-width:120px">
          <div style="width:${total>0?Math.round(r.count/total*100):0}%;height:100%;background:var(--primary);border-radius:9px"></div>
        </div>
        <span class="text-xs text-muted">${total>0?Math.round(r.count/total*100):0}%</span>
      </div>
    </td>
  </tr>`).join("");
  document.getElementById("sales-result").innerHTML=`
  <div class="table-wrap">
    <div style="background:rgba(255,255,255,.04);padding:16px 20px;display:flex;justify-content:space-between;align-items:center">
      <div class="text-right"><div class="text-muted text-xs">الراوتر</div><div class="text-white font-bold">${routerName}</div></div>
      <div class="text-center"><div class="text-muted text-xs">إجمالي الكروت</div><div class="text-primary font-black" style="font-size:1.8rem">${total.toLocaleString()}</div></div>
      <div class="text-left"><div class="text-muted text-xs">الفترة</div><div class="text-white text-sm">${document.getElementById("cs-from").value} — ${document.getElementById("cs-to").value}</div></div>
    </div>
    <div class="table-scroll"><table dir="rtl">
      <thead><tr><th>#</th><th>الباقة</th><th>عدد الكروت</th><th>النسبة</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:rgba(46,168,255,.1);font-weight:900">
        <td colspan="2" style="padding:12px 16px;text-align:right;color:#fff">الإجمالي</td>
        <td style="padding:12px 16px;color:var(--primary);font-size:1.1rem">${total.toLocaleString()}</td>
        <td style="padding:12px 16px;color:#64748b">100%</td>
      </tr></tfoot>
    </table></div>
  </div>`;
}

/* ══════════════════════════════════════════════════
   SETTINGS
══════════════════════════════════════════════════ */
function renderSettings() {
  const rows=state.users.map(u=>`<tr>
    <td class="text-white font-bold">${u.full_name||u.name}</td>
    <td>${u.name}</td>
    <td><span class="pill ${u.role==="مدير النظام"?"pill-purple":"pill-blue"}">${u.role}</span></td>

    <div class="flex gap-8 no-print">
      <button class="btn btn-outline">⬇️ تصدير</button>
      <button class="btn btn-outline">⬆️ استيراد</button>
      <button class="btn btn-primary" onclick="toast('تم حفظ الإعدادات','success')">💾 حفظ</button>
    </div>
  </div>
  <div class="stat-grid stat-grid-4 mb-16">
    ${miniStat("المستخدمين",state.users.length)}${miniStat("الصلاحيات","3")}${miniStat("نسخ احتياطية","12")}
    <div class="card text-center"><div class="font-black text-green" style="font-size:1.6rem">ON</div><div class="text-xs text-muted mt-4">حالة النظام</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 2fr;gap:20px">
    <div class="card">
      <div class="card-header"><span>⚙️</span><h2>إعدادات عامة</h2></div>
      <div class="form-group"><label>اسم الشركة</label><input value="AK-MIKROTIK"/></div>
      <div class="form-group"><label>رقم الهاتف</label><input value="777000000" dir="ltr"/></div>
      <div class="form-group"><label>البريد الإلكتروني</label><input value="admin@ak-mikrotik.com" dir="ltr"/></div>
      <div class="form-group"><label>اللغة</label>
        <select><option>العربية (Arabic)</option><option>English</option></select>
      </div>
    </div>
    <div class="card">
      <div class="card-header" style="justify-content:space-between">
        <div class="flex items-center gap-12"><span>👥</span><h2>المستخدمون والصلاحيات</h2></div>
        <button class="btn btn-info no-print" style="padding:6px 12px;font-size:.8rem" onclick="openAddUserModal()">+ مستخدم جديد</button>
      </div>
      <div class="table-scroll"><table>
        <thead><tr><th>الاسم الكامل</th><th>اسم المستخدم</th><th>الصلاحية</th><th>الحالة</th><th>حذف</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  </div>`;
}

function openAddUserModal() {
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">إضافة مستخدم جديد</div>
    <form onsubmit="addUser(event)">
      <div class="form-group"><label>الاسم الكامل</label><input id="u-full" required/></div>
      <div class="form-group"><label>اسم الدخول (Username)</label><input id="u-name" dir="ltr" required/></div>
      <div class="form-group"><label>كلمة المرور</label><input id="u-pass" type="password" required/></div>
      <div class="modal-grid">
        <div class="form-group"><label>الصلاحية</label>
          <select id="u-role"><option>موظف</option><option>محاسب</option><option>مدير النظام</option></select>
        </div>

          <select id="u-status"><option>نشط</option><option>موقوف</option></select>

      </div>
      <button type="submit" class="btn btn-primary btn-full mt-16">إضافة المستخدم</button>

}

async function addUser(e) {
  e.preventDefault();
  const {error}=await sb.from("users").insert([{
    full_name:document.getElementById("u-full").value,
    name:document.getElementById("u-name").value,
    password:document.getElementById("u-pass").value,
    role:document.getElementById("u-role").value,
    status:document.getElementById("u-status").value,
  }]);
  if(error) toast("خطأ","error"); else { toast("تم الإضافة","success"); closeModal(); await loadUsers(); renderPage(); }
}

async function deleteUser(id) {
  if(id===state.user?.id) { toast("لا يمكنك حذف حسابك الحالي","error"); return; }
  if(!confirm("تأكيد الحذف؟")) return;
  const {error}=await sb.from("users").delete().eq("id",id);
  if(error) toast("خطأ","error"); else { await loadUsers(); renderPage(); }
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
(function init() {
  const session = localStorage.getItem("ak_session");
  if(session) {
    try {
      state.user = JSON.parse(session);
      showApp();
    } catch { localStorage.removeItem("ak_session"); }
  }
})();
