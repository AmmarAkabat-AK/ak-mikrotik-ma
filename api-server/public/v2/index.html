<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AK-MIKROTIK v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060b12;--surface:#0d1a24;--surface2:#111f2e;--glass:rgba(13,26,36,.7);
  --accent:#10b981;--accent2:#059669;--accent-dim:rgba(16,185,129,.15);--accent-glow:rgba(16,185,129,.3);
  --border:rgba(16,185,129,.12);--border2:rgba(255,255,255,.06);
  --text:#e2f0eb;--muted:#5a7a6e;--topbar-h:64px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button,input,select,textarea{font-family:inherit}
a{color:var(--accent)}

/* ─── TOPBAR ─── */
#topbar{position:fixed;top:0;right:0;left:0;height:var(--topbar-h);background:rgba(6,11,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#065f46);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 20px var(--accent-glow)}
.logo-text{font-size:1.1rem;font-weight:900;color:#fff}
.logo-v{font-size:.65rem;font-weight:700;color:var(--accent);background:var(--accent-dim);padding:2px 6px;border-radius:6px;border:1px solid var(--accent-glow)}
.topbar-nav{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;padding:0 12px;scrollbar-width:none}
.topbar-nav::-webkit-scrollbar{display:none}
.nav-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;border:none;background:transparent;color:#5a7a6e;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit;flex-shrink:0}
.nav-btn:hover{background:rgba(16,185,129,.08);color:#a7f3d0}
.nav-btn.active{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow)}
.nav-btn .n-icon{font-size:14px}
.topbar-end{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-right:auto}
.live-chip{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.1);border:1px solid var(--accent-glow);padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:700;color:var(--accent)}
.live-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--accent-glow)}50%{opacity:.5;box-shadow:0 0 0 4px transparent}}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border2);padding:5px 12px;border-radius:20px;font-size:.75rem;color:#94a3b8;cursor:pointer}
.hamburger{display:none;width:36px;height:36px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-size:16px;align-items:center;justify-content:center;color:#94a3b8;flex-shrink:0}

/* ─── MOBILE DRAWER ─── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200}
.drawer{position:fixed;top:0;right:0;bottom:0;width:260px;background:var(--surface);z-index:201;padding:20px;overflow-y:auto;transform:translateX(100%);transition:transform .3s}
.drawer.open{transform:translateX(0)}
.drawer-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border2)}
.drawer-nav{display:flex;flex-direction:column;gap:4px}
.drawer-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;border:none;background:transparent;color:#5a7a6e;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;text-align:right;transition:all .2s;font-family:inherit}
.drawer-btn.active{background:var(--accent-dim);color:var(--accent)}
.drawer-btn:hover{background:rgba(255,255,255,.04);color:#a7f3d0}

/* ─── PAGE ─── */
#page{margin-top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;padding:28px 24px 80px}

/* ─── LOGIN ─── */
#login-page{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;background-image:radial-gradient(ellipse at 50% 0%,rgba(16,185,129,.08) 0%,transparent 60%)}
.login-wrap{width:100%;max-width:420px;padding:16px}
.login-card{background:var(--glass);border:1px solid var(--border);border-radius:24px;padding:40px 36px;backdrop-filter:blur(20px);box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(16,185,129,.05) inset}
.login-glow{width:72px;height:72px;margin:0 auto 20px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#065f46);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px var(--accent-glow)}
.login-title{font-size:1.9rem;font-weight:900;color:#fff;text-align:center}
.login-sub{color:var(--muted);font-size:.83rem;text-align:center;margin:6px 0 28px}
.field{position:relative;margin-bottom:12px}
.field-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
input,select{width:100%;padding:13px 42px 13px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:12px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
input[dir="ltr"]{padding-right:14px;padding-left:14px;text-align:left}
input::placeholder{color:#2e4a3e}
label{display:block;font-size:.78rem;color:#5a7a6e;margin-bottom:5px;font-weight:700;letter-spacing:.02em}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.25)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(16,185,129,.35)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:#94a3b8}
.btn-outline:hover{color:#fff;background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.15)}
.btn-danger{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.22)}
.btn-warn{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.btn-warn:hover{background:rgba(245,158,11,.22)}
.btn-info{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.btn-info:hover{background:rgba(59,130,246,.22)}
.btn-green{background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-glow)}
.btn-green:hover{background:rgba(16,185,129,.25)}
.btn-cyan{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
.btn-cyan:hover{background:rgba(6,182,212,.22)}
.btn-full{width:100%;padding:15px;font-size:.95rem;border-radius:14px}
.btn-sm{padding:0;font-size:.75rem;border-radius:8px;width:30px;height:30px}

/* ─── CARDS ─── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:20px}
.card-glow{border-color:var(--border);box-shadow:0 0 0 1px rgba(16,185,129,.04) inset}
.card-header{display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border2);margin-bottom:18px}
.card-header h2{font-size:1rem;font-weight:700;color:#fff}
.card-header .icon{font-size:20px}

/* ─── STATS ─── */
.stat-grid{display:grid;gap:14px;margin-bottom:20px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;transition:transform .25s,border-color .25s}
.stat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(16,185,129,.03),transparent);pointer-events:none}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border)}
.sv{font-size:1.9rem;font-weight:900;color:#fff;margin-top:3px;line-height:1}
.sl{font-size:.75rem;color:var(--muted);font-weight:600;letter-spacing:.02em}
.si{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mini-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:16px;text-align:center}
.mini-v{font-size:1.7rem;font-weight:900;color:#fff}
.mini-l{font-size:.72rem;color:var(--muted);margin-top:3px}

/* ─── TABLE ─── */
.table-wrap{background:var(--surface);border:1px solid var(--border2);border-radius:18px;overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem;text-align:center}
thead{background:rgba(16,185,129,.05);color:var(--muted);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
th{padding:11px 14px;border-bottom:1px solid var(--border2)}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(16,185,129,.03)}
.td-actions{display:flex;justify-content:center;gap:5px}

/* ─── STATUS ─── */
.s-online{color:#34d399;font-weight:700}.s-offline{color:#f87171;font-weight:700}
.s-maint{color:#fbbf24;font-weight:700}.s-active{color:#34d399;font-weight:700}
.s-vac{color:#fbbf24;font-weight:700}.s-susp{color:#f87171;font-weight:700}
.conn-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;margin-left:5px}
.conn-dot.pulse{animation:pulse 1.5s infinite}

/* ─── BADGES / PILLS ─── */
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700}
.pill-green{background:rgba(52,211,153,.12);color:#34d399}
.pill-blue{background:rgba(96,165,250,.12);color:#60a5fa}
.pill-purple{background:rgba(167,139,250,.12);color:#a78bfa}
.tag-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:8px;font-size:.7rem;font-weight:700;border:1px solid}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--surface2);border:1px solid var(--border);border-radius:22px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:slideUp .2s;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.modal-box.wide{max-width:720px}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:1.05rem;font-weight:900;color:#fff;margin-bottom:20px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-full{grid-column:1/-1}
.modal-close{float:left;background:rgba(255,255,255,.06);border:none;color:#94a3b8;font-size:16px;cursor:pointer;line-height:1;padding:6px;border-radius:8px;transition:.2s}
.modal-close:hover{background:rgba(255,255,255,.1);color:#fff}
.form-group{margin-bottom:13px}

/* ─── TOAST ─── */
#toast-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;min-width:260px}
.toast{padding:11px 18px;border-radius:12px;font-size:.84rem;font-weight:600;animation:toastIn .3s,toastOut .3s 2.7s forwards;box-shadow:0 8px 24px rgba(0,0,0,.4);backdrop-filter:blur(10px)}
@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(16px)}}
.toast-success{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.toast-error{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.toast-info{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.toast-warn{background:rgba(245,158,11,.15);color:#fde68a;border:1px solid rgba(245,158,11,.3)}

/* ─── MISC ─── */
.progress{height:5px;background:rgba(255,255,255,.06);border-radius:9px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:9px;transition:width .4s}
.fill-green{background:var(--accent)}.fill-yellow{background:#f59e0b}.fill-red{background:#ef4444}.fill-blue{background:#3b82f6}
.info-box{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px 14px;font-size:.8rem;color:#93c5fd;margin-bottom:12px}
.error-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 14px;font-size:.8rem;color:#fca5a5;margin-bottom:12px}
.warn-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:10px 14px;font-size:.8rem;color:#fde68a;margin-bottom:12px}
.success-box{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:10px 14px;font-size:.8rem;color:#6ee7b7}
#map{height:58vh;min-height:380px;border-radius:18px;overflow:hidden;border:1px solid var(--border2)}
.map-legend{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;font-weight:700;background:var(--surface);padding:10px 14px;border-radius:14px;border:1px solid var(--border2);margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-row{background:var(--surface2);border-radius:12px;padding:12px 14px;font-size:.83rem;color:#a7f3d0;display:flex;align-items:center;gap:10px;margin-bottom:8px;border:1px solid var(--border2)}
.event-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.router-panel{border-radius:14px;padding:15px;border:1px solid;margin-bottom:12px}
.online-panel{background:rgba(16,185,129,.04);border-color:rgba(16,185,129,.18)}
.offline-panel{background:rgba(239,68,68,.04);border-color:rgba(239,68,68,.18)}
.panel-row{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:5px}
.hint-text{color:#fbbf24;font-size:.78rem;font-weight:700;margin-bottom:4px}
.error-mono{color:#5a7a6e;font-size:.7rem;font-family:monospace;word-break:break-all}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.font-bold{font-weight:700}.font-black{font-weight:900}
.text-white{color:#fff}.text-muted{color:var(--muted)}.text-sm{font-size:.85rem}.text-xs{font-size:.73rem}
.text-green{color:#34d399}.text-red{color:#f87171}
.hidden{display:none!important}
.spin{animation:spinning .8s linear infinite}
@keyframes spinning{to{transform:rotate(360deg)}}
.d-ltr{direction:ltr;text-align:left}
.search-wrap{position:relative;flex:1}
.search-wrap input{padding-right:38px}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .2s;font-family:inherit}
.filter-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-glow)}
.tg-log{background:var(--surface2);border-radius:11px;padding:12px 14px;margin-bottom:8px;border-right:4px solid}
.tg-log.err{border-color:#ef4444}.tg-log.ok{border-color:var(--accent)}.tg-log.info{border-color:#3b82f6}
.um-user-card{background:var(--surface2);border-radius:14px;padding:12px 14px;border:1px solid var(--border2);transition:all .2s}
.um-user-card:hover{border-color:rgba(16,185,129,.3);transform:translateY(-1px)}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title-h{font-size:1.35rem;font-weight:900;color:#fff}
.page-sub{font-size:.78rem;color:var(--muted);margin-top:3px}

/* ─── RESPONSIVE GRIDS ─── */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:18px}
.two-col-eq{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.three-col{display:grid;grid-template-columns:1fr 2fr;gap:18px}

@media(max-width:900px){
  .topbar-nav{display:none}
  .hamburger{display:flex}
  .live-chip .live-label{display:none}
  .user-chip{display:none}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .modal-grid{grid-template-columns:1fr}
  .grid-full{grid-column:auto}
  #page{padding:14px 10px 80px}
  .two-col{grid-template-columns:1fr}
  .two-col-eq{grid-template-columns:1fr}
  .three-col{grid-template-columns:1fr}
  .page-head{flex-direction:column;align-items:flex-start;gap:8px}
  .page-head .flex{flex-wrap:wrap}
  table{font-size:.75rem}
  th,td{padding:8px 10px}
  .stat-card .sv{font-size:1.5rem}
  .topbar-end{gap:6px}
  .logo-text{font-size:.95rem}
}
@media print{
  #topbar,.hamburger,.drawer-overlay,.drawer,.no-print{display:none!important}
  #page{margin-top:0;height:auto;overflow:visible;padding:0}
  body{background:#fff;color:#000}
  .card,.table-wrap,.stat-card{border:1px solid #ccc;background:#fff}
  table{font-size:11px}
  thead{background:#f5f5f5!important;color:#333}
}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-glow">📡</div>
      <div class="login-title">AK-MIKROTIK</div>
      <div class="login-sub">نظام إدارة شركات الإنترنت الذكي — الإصدار الثاني</div>
      <form id="login-form">
        <div class="field">
          <span class="field-icon">👤</span>
          <input id="login-user" type="text" placeholder="اسم المستخدم" required/>
        </div>
        <div class="field">
          <span class="field-icon">🔑</span>
          <input id="login-pass" type="password" placeholder="كلمة المرور" required/>
        </div>
        <div class="field">
          <select id="login-role">
            <option>مدير النظام</option>
            <option>موظف</option>
            <option>محاسب</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">دخول النظام ←</button>
      </form>
    </div>
  </div>
</div>

<!-- ════ APP ════ -->
<div id="app" class="hidden">
  <!-- Topbar -->
  <div id="topbar">
    <button class="hamburger" onclick="openDrawer()">☰</button>
    <div class="logo-wrap">
      <div class="logo-icon">📡</div>
      <span class="logo-text">AK-MIKROTIK</span>
      <span class="logo-v">v2</span>
    </div>
    <nav class="topbar-nav" id="top-nav"></nav>
    <div class="topbar-end">
      <div class="live-chip"><span class="live-dot"></span><span class="live-label">LIVE</span></div>
      <div class="user-chip">👤 <span id="user-label"></span></div>
      <button class="btn btn-danger" style="padding:6px 12px;font-size:.75rem;flex-shrink:0" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <!-- Mobile Drawer -->

async function loadAll() {

  const off=S.devices.filter(d=>d.status==="offline").length;

function sBadge(s) {
  if(s==="online")      return `<span class="s-online"><span class="conn-dot pulse" style="color:#34d399"></span>متصل</span>`;

  if(s==="maintenance") return `<span class="s-maint"><span class="conn-dot" style="color:#fbbf24"></span>صيانة</span>`;

}

async function refreshDevs() { await ld(); if(S.page==="devices") render(); toast("تم التحديث","success"); }

async function delDev(id) {
  if(!confirm("هل أنت متأكد؟")) return;
  const {error}=await sb.from("devices").delete().eq("id",id);

  const dev=id?S.devices.find(d=>d.id===id):null;

/* ─── DISCOVER ─── */
let discR=[],addedK=new Set();
function openDiscoverModal() {
  discR=[]; addedK=new Set();
  const rOpts=S.routers.map(r=>`<option value="${r.id}">${r.name} (${r.host})</option>`).join("");
  openModal(`<div class="modal-box wide">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">🌐 كشف الأجهزة من MikroTik</div>
    <div class="form-group"><label>الراوتر</label><select id="disc-router" dir="rtl"><option value="">اختر</option>${rOpts}</select></div>
    <div class="form-group"><label>نوع الجهاز</label>
      <select id="disc-filter">${["كل الأجهزة","مودم","أنتينا","أكسس بوينت","راوتر MikroTik","سويتش"].map(f=>`<option>${f}</option>`).join("")}</select>
    </div>
    <div class="form-group"><label>فلتر شبكة (اختياري)</label><input id="disc-subnet" dir="ltr" placeholder="172.16.0.0/16"/></div>
    <div id="disc-error"></div>
    <button class="btn btn-primary btn-full" onclick="runDiscover()" id="disc-btn">🔍 بدء الكشف</button>
    <div id="disc-results" class="mt-16"></div>
  </div>`);
}

async function runDiscover() {
  const rid=document.getElementById("disc-router").value;
  const r=S.routers.find(x=>String(x.id)===String(rid));
  if(!r){toast("اختر الراوتر","error");return;}
  const btn=document.getElementById("disc-btn"); btn.disabled=true; btn.textContent="⏳ جاري الكشف...";
  document.getElementById("disc-error").innerHTML="";
  document.getElementById("disc-results").innerHTML=`<div class="text-muted text-sm text-center" style="padding:20px"><span class="spin" style="display:inline-block">⏳</span> جاري الكشف...</div>`;
  try {
    const res=await fetch("/api/mikrotik/discover",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({host:r.host,username:r.username,password:r.password,port:r.port||8728,
        filterType:document.getElementById("disc-filter").value,subnet:document.getElementById("disc-subnet").value})});
    const data=await res.json();
    if(!res.ok){document.getElementById("disc-error").innerHTML=`<div class="error-box">❌ ${data.error||"فشل"}</div>`;document.getElementById("disc-results").innerHTML="";return;}
    discR=data.devices||[];
    renderDiscResults(r.name);
  } catch { document.getElementById("disc-error").innerHTML=`<div class="error-box">تعذر الاتصال</div>`; document.getElementById("disc-results").innerHTML=""; }
  finally { btn.disabled=false; btn.textContent="🔍 بدء الكشف"; }
}

function renderDiscResults(rName) {
  const el=document.getElementById("disc-results"); if(!el) return;
  if(!discR.length){el.innerHTML=`<div class="text-muted text-center" style="padding:20px">لا توجد أجهزة</div>`;return;}
  el.innerHTML=`<div class="flex justify-between items-center mb-8"><span class="text-white font-bold">تم العثور على ${discR.length} جهاز</span>
    <button class="btn btn-green" onclick="addAllDisc('${rName}')">✚ إضافة الكل</button></div>`
    +discR.map((d,i)=>{const k=d.mac||d.ip;const added=addedK.has(k);return `<div class="card mb-8" style="padding:12px 14px">
      <div class="flex justify-between items-center">
        <div><div class="font-bold text-white text-sm">${d.hostname||d.ip}</div>
          <div class="d-ltr text-xs" style="color:var(--muted)">${d.ip} ${d.mac?`| ${d.mac}`:""}</div>
          <div class="text-xs" style="color:var(--muted)">${d.type||""} ${d.interface?`| ${d.interface}`:""}</div>
        </div>
        <button class="btn ${added?"btn-outline":"btn-primary"}" id="add-disc-${i}" onclick="addOneDisc(${i},'${rName}')" ${added?"disabled":""} style="font-size:.75rem;padding:6px 12px">${added?"✓ أضيف":"+ إضافة"}</button>
      </div>
    </div>`;}).join("");
}

async function addOneDisc(i,rName) {
  const d=discR[i]; const k=d.mac||d.ip;
  const {error}=await sb.from("devices").insert([{name:d.hostname||d.ip,type:d.type==="راوتر MikroTik"?"برج رئيسي":d.type||"مودم",router:rName,ip:d.ip,status:"online",notes:`MAC:${d.mac}|${d.interface}`}]);
  if(error) toast("خطأ","error");
  else { toast(`تمت إضافة ${d.hostname||d.ip}`,"success"); addedK.add(k); await ld(); renderDiscResults(rName); }
}
async function addAllDisc(rName) {
  const toAdd=discR.filter(d=>!addedK.has(d.mac||d.ip));
  if(!toAdd.length) return;
  const rows=toAdd.map(d=>({name:d.hostname||d.ip,type:d.type==="راوتر MikroTik"?"برج رئيسي":d.type||"مودم",router:rName,ip:d.ip,status:"online",notes:`MAC:${d.mac}|${d.interface}`}));
  const {error}=await sb.from("devices").insert(rows);
  if(error) toast("خطأ","error");
  else { toast(`تمت إضافة ${rows.length} جهاز`,"success"); toAdd.forEach(d=>addedK.add(d.mac||d.ip)); await ld(); renderDiscResults(rName); }
}

/* ══════════ MAP ══════════ */
function rMap() {
  const on=S.devices.filter(d=>d.status==="online").length;
  const off=S.devices.filter(d=>d.status==="offline").length;
  return `
  <div class="stat-grid g4 mb-12">
    ${mc("الأجهزة",S.devices.length)}${mc("متصل",on)}${mc("منقطع",off)}${mc("راوترات",S.routers.length)}
  </div>
  <div class="flex gap-8 mb-12 no-print" style="flex-wrap:wrap">
    <div class="search-wrap"><span class="search-icon">🔍</span>
      <input id="map-search" placeholder="بحث باسم أو IP..." oninput="filterMap()"/>
    </div>
    <div class="filter-btns" id="map-filters">
      ${["الكل","برج رئيسي","أنتينا","مودم","منقطع"].map((f,i)=>`<button class="filter-btn${i===0?" active":""}" onclick="setMF('${f}',this)">${f}</button>`).join("")}
    </div>
    <div class="filter-btns">
      <button class="filter-btn" onclick="setMT('m',this)">🗺️</button>
      <button class="filter-btn active" onclick="setMT('s',this)">🛰️</button>
      <button class="filter-btn" onclick="setMT('p',this)">🌍</button>
    </div>
  </div>
  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>متصل</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>منقطع</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>صيانة</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>MikroTik</div>
  </div>
  <div id="map"></div>`;
}

let _map=null,_tileL=null,_mtype="s",_mfilter="الكل";
function parseLoc(s){if(!s)return null;const p=s.split(",");if(p.length!==2)return null;const la=parseFloat(p[0]),ln=parseFloat(p[1]);return isNaN(la)||isNaN(ln)?null:[la,ln];}
function colorIcon(c){return L.divIcon({className:"",iconAnchor:[0,24],popupAnchor:[0,-36],html:`<span style="background:${c};width:22px;height:22px;display:block;position:relative;left:-11px;top:-11px;border-radius:50% 50% 0 50%;transform:rotate(-45deg);border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 8px rgba(0,0,0,.5)"></span>`});}
function initMap(){
  if(_map){_map.remove();_map=null;}
  _map=L.map("map",{zoomControl:false}).setView([15.3694,44.191],12);
  L.control.zoom({position:"bottomleft"}).addTo(_map);
  _tileL=L.tileLayer(`https://{s}.google.com/vt/lyrs=${_mtype}&x={x}&y={y}&z={z}`,{subdomains:["mt0","mt1","mt2","mt3"],attribution:"© Google Maps",maxZoom:20}).addTo(_map);
  updateMarkers();
}
function updateMarkers(){
  if(!_map)return;
  _map.eachLayer(l=>{if(l instanceof L.Marker||l instanceof L.Polyline)_map.removeLayer(l);});
  const q=(document.getElementById("map-search")?.value||"").toLowerCase();
  S.devices.filter(d=>{
    const m=d.name?.toLowerCase().includes(q)||d.ip?.includes(q);
    if(!m)return false;
    if(_mfilter==="الكل")return true;
    if(_mfilter==="منقطع")return d.status==="offline";
    return d.type===_mfilter;
  }).forEach(d=>{
    const ll=parseLoc(d.location);if(!ll)return;
    const c=d.status==="online"?"#34d399":d.status==="offline"?"#f87171":"#fbbf24";
    L.marker(ll,{icon:colorIcon(c)}).addTo(_map).bindPopup(`<div style="font-family:Cairo,sans-serif;min-width:140px;direction:rtl"><strong>${d.name}</strong><br/>${d.type}<br/><span style="color:${c}">${d.status}</span>${d.ip?`<br/><span style="direction:ltr;display:block">${d.ip}</span>`:""}</div>`);
  });

let pCache={};
function rMikrotik() {
  const rows=S.routers.map(r=>`<tr>
    <td class="font-bold text-white">${r.name}</td>
    <td class="d-ltr">${r.host}</td>
    <td class="d-ltr">${r.port||8728}</td>
    <td id="rstat-${r.id}">${rStatCell(r.id)}</td>
    <td><div class="td-actions">
      <button class="btn btn-green btn-sm" id="ping-${r.id}" onclick="pingR(${r.id})" title="فحص">⚡</button>
      <button class="btn btn-warn btn-sm" onclick="openUMForR(${r.id})" title="UM">🎫</button>
      <button class="btn btn-info btn-sm" onclick="openRModal(${r.id})" title="تعديل">✎</button>
      <button class="btn btn-danger btn-sm" onclick="delR(${r.id})" title="حذف">🗑</button>
    </div></td>
  </tr>`).join()||`<tr><td colspan="5" class="text-muted text-center" style="padding:36px">لا توجد راوترات</td></tr>`;
  const checked=S.routers.filter(r=>pCache[r.id]);
  return `
  <div class="page-head">
    <div><div class="page-title-h">راوترات MikroTik</div><div class="page-sub">التحكم المركزي في راوترات الشبكة</div></div>
    <div class="flex gap-8 no-print">
      <button class="btn btn-outline" onclick="pingAll()" id="ping-all">↻ فحص الكل</button>
      <button class="btn btn-primary" onclick="openRModal()">+ إضافة راوتر</button>
    </div>
  </div>
  <div class="two-col">
    <div class="table-wrap"><div class="table-scroll">
      <table><thead><tr><th>الفرع</th><th>IP / Host</th><th>المنفذ</th><th>الحالة</th><th>إجراء</th></tr></thead>
      <tbody id="r-tbody">${rows}</tbody></table>
    </div></div>
    <div class="card card-glow">
      <div class="card-header"><span>🛡️</span><h2>بيانات مسحوبة</h2></div>
      <div id="r-info">${checked.length===0?`<div class="text-muted text-center text-sm" style="padding:36px 0">اضغط ⚡ لسحب البيانات</div>`:checked.map(r=>rInfoCard(r.id)).join("")}</div>
    </div>
  </div>`;
}

function rStatCell(rid){
  const info=pCache[rid];
  if(!info)return rDbStat(S.routers.find(r=>r.id===rid)?.status);
  if(info.online)return `<span class="s-online"><span class="conn-dot pulse" style="color:#34d399"></span>متصل</span><div class="text-xs text-muted mt-4">${info.uptime||""}</div>`;
  if(info.reason==="PRIVATE_IP")return `<span class="s-offline">IP داخلي</span>`;
  return `<span class="s-offline"><span class="conn-dot" style="color:#f87171"></span>غير متصل</span>`;
}
function rDbStat(s){
  if(s==="online")return `<span class="s-online"><span class="conn-dot pulse" style="color:#34d399"></span>متصل</span>`;
  return `<span class="s-offline"><span class="conn-dot" style="color:#f87171"></span>غير متصل</span>`;
}
function rInfoCard(rid){
  const info=pCache[rid]; const r=S.routers.find(x=>x.id===rid);
  if(!info||!r)return "";
  const mem=(info.freeMemory&&info.totalMemory)?Math.round(((info.totalMemory-info.freeMemory)/info.totalMemory)*100):null;
  return `<div class="router-panel ${info.online?"online-panel":"offline-panel"} mb-12">
    <div class="flex items-center justify-between mb-8">
      <span style="color:${info.online?"#34d399":"#f87171"};font-weight:700;font-size:.82rem">${info.online?"📶 متصل":"📴 غير متصل"}</span>
      <span class="font-bold text-white text-sm">${r.name}</span>
    </div>
    ${info.online?`
      ${info.board?`<div class="panel-row"><span class="text-white">${info.board}</span><span class="text-muted">الجهاز</span></div>`:""}
      ${info.version?`<div class="panel-row"><span class="text-white d-ltr" style="font-size:.76rem">${info.version}</span><span class="text-muted">الإصدار</span></div>`:""}
      ${info.uptime?`<div class="panel-row"><span style="color:var(--accent)">⏱ ${info.uptime}</span><span class="text-muted">وقت التشغيل</span></div>`:""}
      ${info.cpuLoad!=null?`<div class="panel-row"><span>CPU ${info.cpuLoad}%</span><span class="text-muted">المعالج</span></div>
       <div class="progress"><div class="progress-fill ${info.cpuLoad>80?"fill-red":info.cpuLoad>50?"fill-yellow":"fill-green"}" style="width:${info.cpuLoad}%"></div></div>`:""}
      ${mem!=null?`<div class="panel-row mt-8"><span>RAM ${mem}%</span><span class="text-muted">الذاكرة</span></div>
       <div class="progress"><div class="progress-fill ${mem>80?"fill-red":mem>60?"fill-yellow":"fill-blue"}" style="width:${mem}%"></div></div>`:""}
    `:`
      ${info.hint?`<div class="hint-text">⚠ ${info.hint}</div>`:""}
      ${info.error?`<div class="error-mono">${info.error}</div>`:""}
    `}
  </div>`;
}

async function pingR(id){
  const r=S.routers.find(x=>x.id===id); if(!r)return;
  const btn=document.getElementById(`ping-${id}`); if(btn){btn.disabled=true;btn.textContent="⏳";}
  const statEl=document.getElementById(`rstat-${id}`); if(statEl)statEl.innerHTML=`<span class="text-muted">⏳ فحص...</span>`;
  try {
    const res=await fetch("/api/mikrotik/ping",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({host:r.host,username:r.username,password:r.password,port:r.port||8728})});
    const data=await res.json(); pCache[id]=data;
    await sb.from("mikrotik_servers").update({status:data.online?"online":"disconnected"}).eq("id",id);
    await lr();
    if(statEl)statEl.innerHTML=rStatCell(id);
    const panel=document.getElementById("r-info");
    if(panel)panel.innerHTML=S.routers.filter(x=>pCache[x.id]).map(x=>rInfoCard(x.id)).join("")||`<div class="text-muted text-center text-sm" style="padding:36px 0">اضغط ⚡ للفحص</div>`;
    toast(data.online?`${r.name} متصل ✓`:`${r.name} غير متصل`,data.online?"success":"error");
  } catch { toast("تعذر الاتصال بالسيرفر","error"); }
  finally { if(btn){btn.disabled=false;btn.textContent="⚡";} }
}
async function pingAll(){
  const btn=document.getElementById("ping-all"); if(btn){btn.disabled=true;btn.textContent="⏳ جاري الفحص...";}
  toast("جاري فحص جميع الراوترات...","info");
  await Promise.all(S.routers.map(r=>pingR(r.id)));
  if(btn){btn.disabled=false;btn.textContent="↻ فحص الكل";}
  toast("اكتمل الفحص","success");
}
async function delR(id){
  if(!confirm("حذف الراوتر؟"))return;
  const {error}=await sb.from("mikrotik_servers").delete().eq("id",id);
  if(error)toast("خطأ","error"); else { delete pCache[id]; toast("تم الحذف","success"); await lr(); render(); }
}
function openRModal(id){
  const r=id?S.routers.find(x=>x.id===id):null;

    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">${id?"تعديل الراوتر":"إضافة راوتر جديد"}</div>
    <form onsubmit="saveR(event,${id||0})">

        <div class="form-group"><label>API Port</label><input id="r-port" type="number" value="${d.port||8728}" dir="ltr"/></div>

        <div style="color:#93c5fd;font-weight:700;margin-bottom:6px">⚠️ متطلبات الاتصال</div>
        <div>• يجب أن يكون الـ IP <strong style="color:#fff">عاماً (Public IP)</strong> أو DDNS</div>

async function saveR(e,id){
  e.preventDefault();
  const payload={name:document.getElementById("r-name").value,host:document.getElementById("r-host").value,username:document.getElementById("r-user").value,password:document.getElementById("r-pass").value,port:parseInt(document.getElementById("r-port").value)||8728,location:document.getElementById("r-loc").value};
  const {error}=id?await sb.from("mikrotik_servers").update(payload).eq("id",id):await sb.from("mikrotik_servers").insert([{...payload,status:"disconnected"}]);
  if(error)toast("خطأ","error"); else { toast("تم الحفظ","success"); closeModal(); await lr(); render(); }
}

let umS={rid:"",users:[],profiles:[],total:0,active:0,disabled:0,loading:false,search:"",pf:"الكل",sf:"الكل",_all:null};
const TAG_C=[
  {bg:"rgba(16,185,129,.15)",color:"#34d399",border:"rgba(16,185,129,.3)"},
  {bg:"rgba(59,130,246,.15)",color:"#60a5fa",border:"rgba(59,130,246,.3)"},
  {bg:"rgba(167,139,250,.15)",color:"#a78bfa",border:"rgba(167,139,250,.3)"},
  {bg:"rgba(245,158,11,.15)",color:"#fbbf24",border:"rgba(245,158,11,.3)"},
  {bg:"rgba(6,182,212,.15)",color:"#22d3ee",border:"rgba(6,182,212,.3)"},
  {bg:"rgba(239,68,68,.15)",color:"#f87171",border:"rgba(239,68,68,.3)"},
  {bg:"rgba(236,72,153,.15)",color:"#f472b6",border:"rgba(236,72,153,.3)"},
  {bg:"rgba(234,179,8,.15)",color:"#eab308",border:"rgba(234,179,8,.3)"},
];
const tagCC={};let tagCI=0;
function getTC(p){if(!tagCC[p]){tagCC[p]=TAG_C[tagCI%TAG_C.length];tagCI++;}return tagCC[p];}
function pTag(p){if(!p)return`<span class="text-muted">-</span>`;const c=getTC(p);return`<span class="tag-badge" style="background:${c.bg};color:${c.color};border-color:${c.border}">🎫 ${p}</span>`;}

function rUM(){
  const rOpts=S.routers.map(r=>`<option value="${r.id}"${umS.rid===String(r.id)?" selected":""}>${r.name} (${r.host})</option>`).join("");
  return `
  <div class="page-head">
    <div><div class="page-title-h">مستخدمو User Manager</div><div class="page-sub">عرض مستخدمي الباقات مع ياقاتهم</div></div>
    <button class="btn btn-outline no-print" onclick="window.print()">🖨️ طباعة</button>
  </div>
  <div class="card card-glow mb-16">
    <div class="flex gap-12 items-center" style="flex-wrap:wrap">
      <div class="form-group" style="margin:0;flex:1;min-width:180px">
        <label>الراوتر</label>
        <select id="um-router" dir="rtl" onchange="onUMRC()"><option value="">اختر الراوتر</option>${rOpts}</select>
      </div>
      <div style="padding-top:18px">
        <button class="btn btn-primary" onclick="loadUM()" id="um-btn">🔄 تحميل المستخدمين</button>
      </div>
    </div>
    <div id="um-rstat" class="mt-8"></div>
  </div>
  <div id="um-f" class="${umS.users.length===0?"hidden":""}">
    <div class="stat-grid g4 mb-16">
      ${mc("إجمالي المستخدمين",umS.total)}${mc("نشطون الآن",umS.active)}${mc("معطّلون",umS.disabled)}${mc("الباقات",umS.profiles.length)}
    </div>
    <div class="flex gap-12 mb-16" style="flex-wrap:wrap">
      <div class="search-wrap" style="flex:1;min-width:180px">
        <span class="search-icon">🔍</span>

      </div>
      <div class="filter-btns" id="um-sf">
        ${["الكل","نشط","معطل"].map(f=>`<button class="filter-btn${umS.sf===f?" active":""}" onclick="setUSF('${f}',this)">${f}</button>`).join("")}
      </div>
    </div>
    <div class="filter-btns mb-16" id="um-pf">
      <button class="filter-btn${umS.pf==="الكل"?" active":""}" onclick="setUPF('الكل',this)">الكل</button>
      ${umS.profiles.map(p=>`<button class="filter-btn${umS.pf===p?" active":""}" onclick="setUPF('${p}',this)">${p}</button>`).join("")}
    </div>
  </div>
  <div id="um-c">${umS.users.length===0&&!umS.loading?
    `<div class="card text-center" style="padding:56px"><div style="font-size:44px;margin-bottom:12px">🎫</div><div class="text-muted">اختر الراوتر واضغط تحميل</div></div>`:renderUMT()}</div>`;
}

function renderUMT(){
  if(umS.loading)return`<div class="card text-center" style="padding:56px"><div class="spin" style="font-size:32px;display:inline-block">⏳</div><div class="text-muted mt-12">جاري التحميل...</div></div>`;
  if(!umS.users.length)return`<div class="card text-center text-muted" style="padding:56px">لا توجد مستخدمون مطابقون</div>`;
  const rows=umS.users.map(u=>`<tr>
    <td class="font-bold text-white d-ltr">${u.username}</td>
    <td>${pTag(u.profile)}</td>
    <td>${u.isActive?'<span class="s-active"><span class="conn-dot pulse" style="color:#34d399"></span>نشط</span>':u.disabled?'<span class="s-susp">معطّل</span>':'<span class="text-muted">غير متصل</span>'}</td>
    <td class="d-ltr text-muted" style="font-size:.76rem">${u["end-time"]||"-"}</td>
    <td class="text-muted text-sm">${u.comment||"-"}</td>
    <td><button class="btn btn-info btn-sm" onclick="showUMD('${u.username}')" title="تفاصيل">👁</button></td>
  </tr>`).join()||`<tr><td colspan="6" class="text-muted text-center" style="padding:36px">لا يوجد</td></tr>`;
  return`<div class="table-wrap"><div class="table-scroll">
    <table><thead><tr><th>اسم المستخدم</th><th>الباقة / الياقة</th><th>الحالة</th><th>تاريخ الانتهاء</th><th>ملاحظة</th><th>إجراء</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div></div>`;
}

function onUMRC(){const rid=document.getElementById("um-router").value;umS={...umS,rid,users:[],profiles:[],total:0,active:0,disabled:0,search:"",pf:"الكل",sf:"الكل",_all:null};if(S.page==="um-users"){document.getElementById("um-rstat").innerHTML="";document.getElementById("um-f").classList.add("hidden");document.getElementById("um-c").innerHTML=`<div class="card text-center" style="padding:56px"><div style="font-size:44px">🎫</div><div class="text-muted mt-12">اضغط تحميل</div></div>`;}}

async function loadUM(){
  const rid=document.getElementById("um-router")?.value||umS.rid;
  const router=S.routers.find(r=>String(r.id)===String(rid));
  if(!router){toast("اختر الراوتر","error");return;}
  umS.rid=String(rid); umS.loading=true;
  const btn=document.getElementById("um-btn"); if(btn){btn.disabled=true;btn.textContent="⏳ جاري التحميل...";}
  document.getElementById("um-rstat").innerHTML=`<div class="info-box">⏳ جاري الاتصال بـ User Manager...</div>`;
  document.getElementById("um-c").innerHTML=`<div class="card text-center" style="padding:56px"><div class="spin" style="font-size:32px;display:inline-block">⏳</div><div class="text-muted mt-12">جاري تحميل المستخدمين...</div></div>`;
  try {
    const res=await fetch("/api/mikrotik/um-users",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({host:router.host,username:router.username,password:router.password,port:router.port||8728})});
    const data=await res.json();
    if(!res.ok){document.getElementById("um-rstat").innerHTML=`<div class="error-box">❌ ${data.error||"فشل الاتصال"}</div>`;umS.loading=false;if(btn){btn.disabled=false;btn.textContent="🔄 تحميل";}document.getElementById("um-c").innerHTML=`<div class="card text-center text-muted" style="padding:56px">فشل تحميل المستخدمين</div>`;return;}
    const users=data.users||[];
    const profs=[...new Set(users.map(u=>u.profile).filter(Boolean))];
    umS={...umS,users,profiles:profs,total:users.length,active:users.filter(u=>u.isActive).length,disabled:users.filter(u=>u.disabled).length,loading:false,search:"",pf:"الكل",sf:"الكل",_all:users};
    document.getElementById("um-rstat").innerHTML=`<div class="success-box">✓ تم تحميل ${users.length} مستخدم | ${profs.length} باقة</div>`;
    document.getElementById("um-f").classList.remove("hidden");
    document.getElementById("um-c").innerHTML=renderUMT();
    document.getElementById("um-f").innerHTML=document.getElementById("um-f").innerHTML;
    render();
  } catch { document.getElementById("um-rstat").innerHTML=`<div class="error-box">تعذر الوصول للسيرفر</div>`; umS.loading=false; }
  finally { if(btn){btn.disabled=false;btn.textContent="🔄 تحميل المستخدمين";} }
}

function filterUM(){umS.search=document.getElementById("um-search")?.value||"";applyUMF();}
function setUSF(s,btn){umS.sf=s;document.querySelectorAll("#um-sf .filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");applyUMF();}
function setUPF(p,btn){umS.pf=p;document.querySelectorAll("#um-pf .filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");applyUMF();}
function applyUMF(){
  const all=umS._all||umS.users;
  const q=umS.search.toLowerCase();
  umS.users=all.filter(u=>{
    if(q&&!u.username.toLowerCase().includes(q)&&!(u.profile||"").toLowerCase().includes(q)&&!(u.comment||"").toLowerCase().includes(q))return false;
    if(umS.pf!=="الكل"&&u.profile!==umS.pf)return false;
    if(umS.sf==="نشط"&&!u.isActive)return false;
    if(umS.sf==="معطل"&&!u.disabled)return false;
    return true;
  });
  document.getElementById("um-c").innerHTML=renderUMT();
}

      ${u["limit-bytes-in"]?`<div class="panel-row" style="background:var(--surface);border-radius:10px;padding:10px 14px"><span class="text-muted">حد التنزيل</span><span class="text-white">${fmtB(u["limit-bytes-in"])}</span></div>`:""}
      ${u["limit-bytes-out"]?`<div class="panel-row" style="background:var(--surface);border-radius:10px;padding:10px 14px"><span class="text-muted">حد الرفع</span><span class="text-white">${fmtB(u["limit-bytes-out"])}</span></div>`:""}
      ${u.comment?`<div class="panel-row" style="background:var(--surface);border-radius:10px;padding:10px 14px"><span class="text-muted">ملاحظة</span><span class="text-white">${u.comment}</span></div>`:""}
    </div>
  </div>`);
}
function fmtB(b){if(!b||b==="0")return "غير محدود";const n=parseInt(b);if(isNaN(n))return b;if(n>=1073741824)return(n/1073741824).toFixed(1)+" GB";if(n>=1048576)return(n/1048576).toFixed(1)+" MB";if(n>=1024)return(n/1024).toFixed(1)+" KB";return n+" B";}
function openUMForR(id){umS={...umS,rid:String(id),users:[],profiles:[],total:0,active:0,disabled:0,search:"",pf:"الكل",sf:"الكل",_all:null};go("um-users");setTimeout(()=>{const sel=document.getElementById("um-router");if(sel)sel.value=String(id);loadUM();},100);}

/* ══════════ WATCHERS ══════════ */
function rWatchers(){
  const act=S.watchers.filter(w=>w.status==="نشط").length;
  const devC=new Set(S.watchers.map(w=>w.device).filter(Boolean)).size;
  const rows=S.watchers.map(w=>`<tr>
    <td class="font-bold text-white">${w.name}</td>
    <td class="d-ltr">${w.phone||"-"}</td>
    <td>${w.device||"-"}</td>
    <td class="d-ltr">${w.telegram||"-"}</td>
    <td>${wStat(w.status)}</td>
    <td><div class="td-actions">
      <button class="btn btn-info btn-sm" onclick="openWModal(${w.id})">✎</button>
      <button class="btn btn-danger btn-sm" onclick="delW(${w.id})">🗑</button>
    </div></td>
  </tr>`).join()||`<tr><td colspan="6" class="text-muted text-center" style="padding:36px">لا يوجد موظفين</td></tr>`;
  return `
  <div class="page-head">
    <div><div class="page-title-h">الموظفون والمراقبة</div><div class="page-sub">إدارة موظفي المراقبة</div></div>
    <button class="btn btn-primary no-print" onclick="openWModal()">👤+ إضافة موظف</button>
  </div>
  <div class="stat-grid g3 mb-16">
    ${mc("عدد الموظفين",S.watchers.length)}${mc("موظفون نشطون",act)}${mc("أجهزة تحت المراقبة",devC)}
  </div>
  <div class="table-wrap"><div class="table-scroll">
    <table><thead><tr><th>الاسم</th><th>الهاتف</th><th>الجهاز</th><th>Telegram</th><th>الحالة</th><th>إجراء</th></tr></thead>
    <tbody>${rows}</tbody></table>
  </div></div>`;
}
function wStat(s){if(s==="نشط")return`<span class="s-active">نشط</span>`;if(s==="إجازة")return`<span class="s-vac">إجازة</span>`;if(s==="موقوف")return`<span class="s-susp">موقوف</span>`;return s||"-";}
async function delW(id){if(!confirm("حذف الموظف؟"))return;const {error}=await sb.from("watchers").delete().eq("id",id);if(error)toast("خطأ","error");else{toast("تم الحذف","success");await lw();render();}}
function openWModal(id){
  const w=id?S.watchers.find(x=>x.id===id):null;
  const d=w||{name:"",phone:"",device:"",telegram:"",status:"نشط"};
  const dOpts=S.devices.map(x=>`<option${d.device===x.name?" selected":""}>${x.name}</option>`).join("");
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">إضافة / تعديل موظف</div>
    <form onsubmit="saveW(event,${id||0})">
      <div class="form-group"><label>اسم الموظف</label><input id="w-name" value="${d.name}" required/></div>
      <div class="modal-grid">
        <div class="form-group"><label>رقم الهاتف</label><input id="w-phone" value="${d.phone||""}" dir="ltr"/></div>
        <div class="form-group"><label>Telegram ID</label><input id="w-tg" value="${d.telegram||""}" dir="ltr"/></div>
      </div>
      <div class="form-group"><label>الجهاز المراقب</label><select id="w-device"><option value="">لا يوجد</option>${dOpts}</select></div>
      <div class="form-group"><label>الحالة</label><select id="w-status"><option${d.status==="نشط"?" selected":""}>نشط</option><option${d.status==="إجازة"?" selected":""}>إجازة</option><option${d.status==="موقوف"?" selected":""}>موقوف</option></select></div>
      <button type="submit" class="btn btn-primary btn-full mt-16">💾 حفظ</button>
    </form>
  </div>`);
}
async function saveW(e,id){
  e.preventDefault();
  const payload={name:document.getElementById("w-name").value,phone:document.getElementById("w-phone").value,telegram:document.getElementById("w-tg").value,device:document.getElementById("w-device").value,status:document.getElementById("w-status").value};
  const {error}=id?await sb.from("watchers").update(payload).eq("id",id):await sb.from("watchers").insert([payload]);
  if(error)toast("خطأ","error");else{toast("تم الحفظ","success");closeModal();await lw();render();}
}

/* ══════════ TELEGRAM ══════════ */
function rTelegram(){
  const recv=S.watchers.filter(w=>w.telegram).length;
  return `
  <div class="page-head"><div><div class="page-title-h">إعدادات Telegram</div><div class="page-sub">ربط النظام ببوت تليجرام للتنبيهات الفورية</div></div></div>
  <div class="stat-grid g4 mb-16">
    ${mc("رسائل اليوم","14")}
    <div class="mini-card"><div class="mini-v" style="color:#34d399">متصل</div><div class="mini-l">حالة البوت</div></div>
    ${mc("تنبيهات","مفعل")}${mc("المستلمين",recv)}
  </div>
  <div class="two-col-eq">
    <div class="card card-glow">
      <div class="card-header"><span>🤖</span><h2>إعدادات البوت</h2></div>
      <div class="form-group"><label>Telegram Bot Token</label><input id="tg-tok" dir="ltr" placeholder="1234567890:AAH_XXXXXXXXXX"/></div>
      <div class="form-group"><label>Default Chat ID</label><input id="tg-cid" dir="ltr" placeholder="-100123456789"/></div>
      <button class="btn btn-primary btn-full mt-16" onclick="testTG()">📤 إرسال رسالة تجريبية</button>
    </div>
    <div class="card card-glow">
      <div class="card-header"><span>💬</span><h2>سجل التنبيهات</h2></div>
      <div class="tg-log err"><div class="text-sm">⚠️ انقطاع: برج شارع الستين</div><div class="text-xs text-muted mt-4" dir="ltr">10:30 AM</div></div>
      <div class="tg-log ok"><div class="text-sm">✅ عودة الاتصال: برج شارع الستين</div><div class="text-xs text-muted mt-4" dir="ltr">10:45 AM</div></div>
      <div class="tg-log info"><div class="text-sm">ℹ️ تنبيه: راوتر الفرع الرئيسي تحت الصيانة</div><div class="text-xs text-muted mt-4" dir="ltr">09:00 AM</div></div>
    </div>
  </div>`;
}
function testTG(){const t=document.getElementById("tg-tok").value,c=document.getElementById("tg-cid").value;if(!t||!c){toast("يرجى إدخال Token و Chat ID","error");return;}toast("جاري الإرسال...","info");setTimeout(()=>toast("تم الإرسال بنجاح!","success"),1000);}

/* ══════════ CARD SALES ══════════ */
let sPkgs=[],sData=[],sRid="";
function rSales(){
  const td=new Date(),ma=new Date(td);ma.setMonth(ma.getMonth()-1);
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const rOpts=S.routers.map(r=>`<option value="${r.id}">${r.name} (${r.host})</option>`).join("");
  return `
  <div class="page-head"><div><div class="page-title-h">تقارير مبيعات الكروت</div><div class="page-sub">إحصائيات مبيعات User Manager</div></div>
    <button class="btn btn-green no-print" onclick="window.print()">🖨️ طباعة</button>
  </div>
  <div class="card card-glow mb-16">
    <div class="form-group"><label>الراوتر</label><select id="cs-r" dir="rtl" onchange="onSRC()"><option value="">اختر الراوتر</option>${rOpts}</select><div id="cs-pstat"></div></div>
    <div class="form-group"><label>الباقة</label><select id="cs-p" dir="rtl" disabled><option value="جميع الباقات">جميع الباقات</option></select></div>
    <div class="modal-grid">
      <div class="form-group"><label>من تاريخ</label><input type="date" id="cs-f" value="${fmt(ma)}" style="color-scheme:dark"/></div>
      <div class="form-group"><label>إلى تاريخ</label><input type="date" id="cs-t" value="${fmt(td)}" style="color-scheme:dark"/></div>
    </div>
    <div id="cs-err"></div>
    <button class="btn btn-primary btn-full" onclick="showSales()" id="cs-btn">📈 عرض التقرير</button>
  </div>
  <div id="s-result"></div>`;
}
function initSales(){sPkgs=[];sData=[];sRid="";}
async function onSRC(){
  const rid=document.getElementById("cs-r").value; sRid=rid;
  const pkgSel=document.getElementById("cs-p"),status=document.getElementById("cs-pstat");
  if(!rid){pkgSel.disabled=true;pkgSel.innerHTML=`<option value="جميع الباقات">جميع الباقات</option>`;status.innerHTML="";return;}
  const router=S.routers.find(r=>String(r.id)===String(rid));if(!router)return;
  status.innerHTML=`<div class="info-box mt-8">⏳ جاري تحميل الباقات...</div>`;pkgSel.disabled=true;
  try {
    const res=await fetch("/api/mikrotik/packages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({host:router.host,username:router.username,password:router.password,port:router.port||8728})});
    const data=await res.json();
    if(!res.ok){status.innerHTML=`<div class="error-box mt-8">❌ ${data.error||"فشل"}</div>`;return;}
    sPkgs=data.packages||[];
    pkgSel.innerHTML=`<option value="جميع الباقات">جميع الباقات</option>`+sPkgs.map(p=>`<option>${p}</option>`).join("");
    pkgSel.disabled=false;
    status.innerHTML=`<div class="success-box mt-8">✓ تم تحميل ${sPkgs.length} باقة</div>`;
  } catch { status.innerHTML=`<div class="error-box mt-8">تعذر الاتصال</div>`; }
}
async function showSales(){
  const rid=document.getElementById("cs-r").value;
  const router=S.routers.find(r=>String(r.id)===String(rid));
  if(!router){toast("اختر الراوتر","error");return;}
  const btn=document.getElementById("cs-btn");btn.disabled=true;btn.textContent="⏳ جاري الجلب...";
  document.getElementById("cs-err").innerHTML="";document.getElementById("s-result").innerHTML="";
  try {
    const res=await fetch("/api/mikrotik/sales-report",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({host:router.host,username:router.username,password:router.password,port:router.port||8728,packageName:document.getElementById("cs-p").value,fromDate:document.getElementById("cs-f").value,toDate:document.getElementById("cs-t").value})});
    const data=await res.json();
    if(!res.ok){document.getElementById("cs-err").innerHTML=`<div class="error-box mb-12">❌ ${data.error||"فشل"}</div>`;return;}
    sData=data.rows||[];renderSalesT(router.name);
  } catch { document.getElementById("cs-err").innerHTML=`<div class="error-box mb-12">تعذر الاتصال</div>`; }
  finally { btn.disabled=false;btn.textContent="📈 عرض التقرير"; }
}
function renderSalesT(rName){
  if(!sData.length){document.getElementById("s-result").innerHTML=`<div class="card text-center text-muted" style="padding:40px">لا توجد بيانات</div>`;return;}
  const total=sData.reduce((s,r)=>s+r.count,0);
  const rows=sData.map((r,i)=>`<tr>
    <td class="text-muted">${i+1}</td>
    <td>${pTag(r.package)}</td>
    <td class="font-black text-white" style="font-size:1.05rem">${r.count.toLocaleString()}</td>
    <td><div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;background:rgba(255,255,255,.05);border-radius:9px;height:5px;max-width:100px">
        <div style="width:${total>0?Math.round(r.count/total*100):0}%;height:100%;background:var(--accent);border-radius:9px"></div>
      </div>
      <span class="text-xs text-muted">${total>0?Math.round(r.count/total*100):0}%</span>
    </div></td>
  </tr>`).join("");
  document.getElementById("s-result").innerHTML=`<div class="table-wrap">
    <div style="background:rgba(16,185,129,.05);padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
      <div><div class="text-muted text-xs">الراوتر</div><div class="text-white font-bold">${rName}</div></div>
      <div style="text-align:center"><div class="text-muted text-xs">الإجمالي</div><div style="color:var(--accent);font-weight:900;font-size:1.7rem">${total.toLocaleString()}</div></div>
      <div><div class="text-muted text-xs">الفترة</div><div class="text-white text-sm">${document.getElementById("cs-f").value} — ${document.getElementById("cs-t").value}</div></div>
    </div>
    <div class="table-scroll"><table dir="rtl">
      <thead><tr><th>#</th><th>الباقة</th><th>عدد الكروت</th><th>النسبة</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:rgba(16,185,129,.08);font-weight:900">
        <td colspan="2" style="padding:12px 16px;text-align:right;color:#fff">الإجمالي</td>
        <td style="padding:12px 16px;color:var(--accent);font-size:1.05rem">${total.toLocaleString()}</td>
        <td style="padding:12px 16px;color:var(--muted)">100%</td>
      </tr></tfoot>
    </table></div>
  </div>`;
}

/* ══════════ SETTINGS ══════════ */
function rSettings(){
  const rows=S.users.map(u=>`<tr>
    <td class="text-white font-bold">${u.full_name||u.name}</td>
    <td class="d-ltr">${u.name}</td>
    <td><span class="pill ${u.role==="مدير النظام"?"pill-purple":"pill-blue"}">${u.role}</span></td>
    <td>${u.status==="نشط"?'<span class="s-active">نشط</span>':'<span class="s-susp">موقوف</span>'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="delU(${u.id})" ${u.id===S.user?.id?"disabled":""}>🗑</button></td>
  </tr>`).join("");
  return `
  <div class="page-head">
    <div><div class="page-title-h">إعدادات النظام</div><div class="page-sub">إعدادات الشركة وصلاحيات المستخدمين</div></div>
    <div class="flex gap-8 no-print">
      <button class="btn btn-outline">⬇️ تصدير</button>
      <button class="btn btn-outline">⬆️ استيراد</button>
      <button class="btn btn-primary" onclick="toast('تم حفظ الإعدادات','success')">💾 حفظ</button>
    </div>
  </div>
  <div class="stat-grid g4 mb-16">
    ${mc("المستخدمين",S.users.length)}${mc("الصلاحيات","3")}${mc("نسخ احتياطية","12")}
    <div class="mini-card"><div class="mini-v" style="color:#34d399">ON</div><div class="mini-l">حالة النظام</div></div>
  </div>
  <div class="three-col">
    <div class="card card-glow">
      <div class="card-header"><span>⚙️</span><h2>إعدادات عامة</h2></div>
      <div class="form-group"><label>اسم الشركة</label><input value="AK-MIKROTIK"/></div>
      <div class="form-group"><label>رقم الهاتف</label><input value="777000000" dir="ltr"/></div>
      <div class="form-group"><label>البريد</label><input value="admin@ak-mikrotik.com" dir="ltr"/></div>
      <div class="form-group"><label>اللغة</label><select><option>العربية</option><option>English</option></select></div>
    </div>
    <div class="card card-glow">
      <div class="card-header" style="justify-content:space-between">
        <div class="flex items-center gap-12"><span>👥</span><h2>المستخدمون والصلاحيات</h2></div>
        <button class="btn btn-green no-print" style="padding:6px 12px;font-size:.78rem" onclick="openAddU()">+ مستخدم</button>
      </div>
      <div class="table-scroll"><table>
        <thead><tr><th>الاسم</th><th>المستخدم</th><th>الصلاحية</th><th>الحالة</th><th>حذف</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  </div>`;
}

function openAddU(){
  openModal(`<div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">إضافة مستخدم جديد</div>
    <form onsubmit="addU(event)">
      <div class="form-group"><label>الاسم الكامل</label><input id="u-full" required/></div>
      <div class="form-group"><label>اسم الدخول</label><input id="u-name" dir="ltr" required/></div>
      <div class="form-group"><label>كلمة المرور</label><input id="u-pass" type="password" required/></div>
      <div class="modal-grid">
        <div class="form-group"><label>الصلاحية</label><select id="u-role"><option>موظف</option><option>محاسب</option><option>مدير النظام</option></select></div>
        <div class="form-group"><label>الحالة</label><select id="u-status"><option>نشط</option><option>موقوف</option></select></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-16">إضافة</button>
    </form>
  </div>`);
}
async function addU(e){
  e.preventDefault();
  const {error}=await sb.from("users").insert([{full_name:document.getElementById("u-full").value,name:document.getElementById("u-name").value,password:document.getElementById("u-pass").value,role:document.getElementById("u-role").value,status:document.getElementById("u-status").value}]);
  if(error)toast("خطأ","error");else{toast("تم الإضافة","success");closeModal();await lu();render();}
}
async function delU(id){
  if(id===S.user?.id){toast("لا يمكنك حذف حسابك","error");return;}
  if(!confirm("تأكيد الحذف؟"))return;
  const {error}=await sb.from("users").delete().eq("id",id);
  if(error)toast("خطأ","error");else{await lu();render();}
}

/* ══════════ INIT ══════════ */
(function init(){
  const saved=localStorage.getItem("ak2_session");
  if(saved){try{S.user=JSON.parse(saved);showApp();}catch{localStorage.removeItem("ak2_session");}}
})();
</script>
</body>
</html>
